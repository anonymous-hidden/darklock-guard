# Per-agent model + prompt mapping. All optional overrides; fall back to ollama.default_model.
agents:
  supervisor:
    model: llama3.1:8b
    temperature: 0.2
    prompt_file: prompts/supervisor.txt

  planner:
    model: llama3.1:8b
    temperature: 0.1
    prompt_file: prompts/planner.txt

  researcher:
    model: llama3.1:8b
    temperature: 0.3
    prompt_file: prompts/researcher.txt
    tools: [read_file, list_dir, search_files, web_search, retrieve_memory_notes]

  coder:
    model: llama3.1:8b          # swap to deepseek-coder / codellama if installed
    temperature: 0.1
    prompt_file: prompts/coder.txt
    tools: [read_file, write_file, list_dir, search_files, inspect_repo]

  security:
    model: llama3.1:8b
    temperature: 0.0
    prompt_file: prompts/security.txt
    tools: [read_file, search_files, inspect_repo]

  memory:
    model: llama3.1:8b
    temperature: 0.0
    prompt_file: prompts/memory.txt
    tools: [append_memory_note, retrieve_memory_notes]

  summarizer:
    model: llama3.1:8b
    temperature: 0.2
    prompt_file: prompts/summarizer.txt

  connector_router:
    model: llama3.1:8b
    temperature: 0.1
    prompt_file: prompts/connector_router.txt

  execution:
    model: llama3.1:8b
    temperature: 0.0
    prompt_file: prompts/execution.txt
    tools: [run_shell_command, read_file, list_dir, log_event]
