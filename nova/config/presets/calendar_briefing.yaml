name: calendar_briefing
description: Summarize today's + upcoming events; highlight conflicts and prep needed.
modes: [agent]
risk: low
approval_required: false
tools: []
connectors: [calendar]
steps:
  - agent: connector_router
    task: "Fetch events for window specified in: {input} (default today + 48h)."
  - agent: summarizer
    task: "Produce a time-ordered brief with prep notes and conflict flags."
validation:
  require_final_summary: true
retries: 1
