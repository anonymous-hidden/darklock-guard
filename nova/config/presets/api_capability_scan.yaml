name: api_capability_scan
description: Inventory connectors — what is enabled, configured, and what each can do.
modes: [normal, agent]
risk: low
approval_required: false
tools: []
connectors: "*"
steps:
  - agent: connector_router
    task: "For each connector: name, enabled, configured, actions, risk, modes."
  - agent: summarizer
    task: "Render capability map grouped by domain."
validation:
  require_final_summary: true
retries: 0
