name: secure_refactor
description: Propose minimal, security-first refactors. Writes patches only after approval.
modes: [agent]
risk: medium
approval_required: true
tools: [read_file, write_file, list_dir, search_files, inspect_repo]
connectors: [local_files]
steps:
  - agent: security
    task: "Identify the highest-priority security issues in scope: {input}."
  - agent: coder
    task: "Produce minimal patches. Return unified diffs only."
  - agent: summarizer
    task: "Explain each patch, risk, and rollback steps."
validation:
  require_final_summary: true
retries: 2
