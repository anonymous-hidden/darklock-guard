name: memory_refresh
description: Consolidate recent notes into a compact knowledge summary; prune dupes.
modes: [normal, agent]
risk: low
approval_required: false
tools: [retrieve_memory_notes, append_memory_note]
connectors: []
steps:
  - agent: memory
    task: "Fetch recent notes, dedupe, and merge semantically similar items."
  - agent: summarizer
    task: "Produce a clean digest with tags."
validation:
  require_final_summary: true
retries: 1
