name: code_review
description: Review a file or directory for bugs, style issues, and risky patterns.
modes: [agent]
risk: low
approval_required: false
tools: [read_file, list_dir, search_files, inspect_repo]
connectors: [local_files]
steps:
  - agent: researcher
    task: "Enumerate code files relevant to: {input}. Skip vendored dirs."
  - agent: coder
    task: "Review each file for bugs, dead code, bad patterns. Produce structured findings."
  - agent: security
    task: "Flag security issues in findings. Classify severity."
  - agent: summarizer
    task: "Merge into a final review with prioritized action items."
validation:
  require_final_summary: true
retries: 1
