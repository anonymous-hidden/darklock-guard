name: notes_sync_assistant
description: Reconcile notes between memory store and a notes connector.
modes: [agent]
risk: medium
approval_required: true
tools: [retrieve_memory_notes, append_memory_note]
connectors: [notes]
steps:
  - agent: memory
    task: "List current memory notes for scope: {input}."
  - agent: connector_router
    task: "Fetch notes from notes connector; diff against memory."
  - agent: summarizer
    task: "Show diff and propose sync actions (requires approval to apply)."
validation:
  require_final_summary: true
retries: 1
