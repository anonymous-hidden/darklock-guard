name: multi_source_summary
description: Merge summaries from multiple docs / URLs / notes into one.
modes: [normal, agent]
risk: low
approval_required: false
tools: [read_file, retrieve_memory_notes]
connectors: [local_files, web_search]
steps:
  - agent: researcher
    task: "Pull content from each source listed in: {input}."
  - agent: summarizer
    task: "Produce a single coherent summary with source tags."
validation:
  require_final_summary: true
retries: 1
