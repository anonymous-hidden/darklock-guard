# Connector config — enabled flags + auth references (values pulled from env).
connectors:
  local_files:
    enabled: true
    read_only: false
  shell:
    enabled: true
    timeout_s: 60
  web_search:
    enabled: true
    provider: duckduckgo        # duckduckgo | searxng
    searxng_url: ${SEARXNG_URL:}
  github:
    enabled: true
    token_env: GITHUB_TOKEN
    default_repo_env: GITHUB_DEFAULT_REPO
  email:
    enabled: false
    smtp_host_env: EMAIL_SMTP_HOST
    smtp_port_env: EMAIL_SMTP_PORT
    smtp_user_env: EMAIL_SMTP_USER
    smtp_pass_env: EMAIL_SMTP_PASS
    from_env: EMAIL_FROM
  calendar:
    enabled: false
    provider_env: CALENDAR_PROVIDER
    token_path_env: CALENDAR_TOKEN_PATH
  notes:
    enabled: false
    path_env: NOTES_PROVIDER_PATH
  weather:
    enabled: false
    api_key_env: OPENWEATHER_API_KEY
    default_city: "New York"
  discord:
    enabled: false
    webhook_env: DISCORD_WEBHOOK_URL
    token_env: DISCORD_BOT_TOKEN
  generic_rest_api:
    enabled: true
    base_url_env: GENERIC_REST_BASE_URL
    bearer_env: GENERIC_REST_BEARER
  contacts:
    enabled: false
    file_env: CONTACTS_FILE
  task_manager:
    enabled: false
    url_env: TASK_MANAGER_URL
  cloud_storage:
    enabled: false
    path_env: CLOUD_STORAGE_PATH
  server_monitor:
    enabled: true
    endpoints_env: SERVER_MONITOR_ENDPOINTS   # comma-separated URLs
