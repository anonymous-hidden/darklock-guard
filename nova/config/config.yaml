ollama:
  host: ${OLLAMA_HOST:http://localhost:11434}
  default_model: llama3.1:8b
  request_timeout_s: 180
  keep_alive: 10m

mode:
  default: normal          # normal | agent
  allow_runtime_switch: true

orchestrator:
  max_iterations: 8
  max_validation_retries: 2
  show_plan: true

memory:
  path: data/memory.sqlite

logging:
  path: logs/nova.jsonl
  level: info
  pretty_console: true

terminal:
  show_banner: true
  colors: true
  show_preset: true
  show_approvals: true

safety:
  dry_run_default: false
  shell_timeout_s: 60
  output_truncate_chars: 12000
