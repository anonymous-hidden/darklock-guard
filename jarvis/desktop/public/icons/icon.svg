<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#151530"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0088cc"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Diamond -->
  <polygon points="256,80 340,256 256,432 172,256" fill="none" stroke="url(#glow)" stroke-width="12" opacity="0.3"/>
  <polygon points="256,140 310,256 256,372 202,256" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.5"/>
  <!-- N letter -->
  <text x="256" y="290" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="180" fill="url(#glow)">N</text>
  <!-- Pulse dot -->
  <circle cx="370" cy="140" r="16" fill="#00d4ff" opacity="0.8"/>
</svg>
