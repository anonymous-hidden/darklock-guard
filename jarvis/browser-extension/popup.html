<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Nova Bridge</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #34d399;
      --accent-dim: #34d39940;
      --text: #e2e2e8;
      --text-dim: #6b6b80;
      --danger: #f87171;
      --danger-dim: #f8717140;
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      min-height: 200px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .nova-glow {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      background: var(--accent-dim);
      box-shadow: 0 0 12px var(--accent-dim);
      transition: all .3s;
    }
    .nova-glow.off {
      background: var(--danger-dim);
      box-shadow: 0 0 12px var(--danger-dim);
    }
    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -.3px;
    }
    .header-text p {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
    }

    /* ── Status ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 14px 20px 0;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }
    .dot.off {
      background: var(--danger);
      box-shadow: 0 0 6px var(--danger);
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .status-label {
      font-size: 12px;
      font-weight: 500;
      flex: 1;
    }
    .status-label span { color: var(--text-dim); font-weight: 400; }

    /* ── Info Cards ── */
    .info {
      display: flex;
      gap: 10px;
      margin: 14px 20px 0;
    }
    .card {
      flex: 1;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
    }
    .card-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .card-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }
    .card-value.off { color: var(--danger); }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 10px;
      margin: 14px 20px 18px;
    }
    .btn {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }
    .btn:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .btn.primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    .btn.primary:hover {
      opacity: .85;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 20px;
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="nova-glow" id="glow">⚡</div>
    <div class="header-text">
      <h1>Nova Browser Bridge</h1>
      <p>Terminal AI ↔ Chrome</p>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <div class="status-label" id="statusLabel">Checking...</div>
  </div>

  <!-- Info -->
  <div class="info">
    <div class="card">
      <div class="card-label">Version</div>
      <div class="card-value">v2.0</div>
    </div>
    <div class="card">
      <div class="card-label">WebSocket</div>
      <div class="card-value" id="wsStatus">—</div>
    </div>
    <div class="card">
      <div class="card-label">Google Docs</div>
      <div class="card-value" id="gdocsStatus">CDP</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn primary" id="btnReconnect">Reconnect</button>
    <button class="btn" id="btnTest">Test</button>
  </div>

  <!-- Footer -->
  <div class="footer">Nova Browser Bridge v2.0.0 — Powered by CDP</div>

  <script src="popup.js"></script>
</body>
</html>
