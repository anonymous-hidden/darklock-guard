<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #10131a;
        --panel: #171c26;
        --line: #2a3344;
        --text: #eef4ff;
        --muted: #95a3b8;
        --accent: #54d8ff;
        --ok: #3ddc84;
        --err: #ff5c7a;
      }
      * { box-sizing: border-box; }
      body {
        width: 360px;
        margin: 0;
        padding: 14px;
        font: 13px/1.35 Inter, ui-sans-serif, system-ui, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      h1 { margin: 0; font-size: 15px; font-weight: 750; letter-spacing: 0; }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 24px;
        padding: 3px 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        background: #121722;
        white-space: nowrap;
      }
      .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--err); }
      .ok .dot { background: var(--ok); }
      section {
        margin-top: 12px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      label {
        display: block;
        margin: 0 0 5px;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: .08em;
      }
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px;
        color: var(--text);
        background: #0f141f;
        outline: none;
      }
      input:focus { border-color: var(--accent); }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      button {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 9px;
        color: var(--text);
        background: #121926;
        cursor: pointer;
      }
      button.primary { border-color: #2388a3; color: #9eeaff; background: rgba(84,216,255,.12); }
      button:hover { border-color: var(--accent); }
      .muted { color: var(--muted); }
      .small { font-size: 12px; }
      .tab {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .footer { margin-top: 10px; color: var(--muted); font-size: 11px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Nova Browser Bridge</h1>
      <div id="badge" class="pill"><span class="dot"></span><span id="badgeText">Checking</span></div>
    </header>

    <section>
      <label for="url">Bridge URL</label>
      <input id="url" value="ws://localhost:8950/browser-bridge" />
      <div class="grid" style="margin-top:8px">
        <button id="save" class="primary">Save + reconnect</button>
        <button id="copy">Copy URL</button>
      </div>
    </section>

    <section>
      <label>Active Tab</label>
      <div id="tabTitle" class="tab">Unknown</div>
      <div id="tabUrl" class="tab muted small">No URL</div>
      <div class="grid" style="margin-top:8px">
        <button id="refresh">Refresh status</button>
        <button id="openYoutube">Open YouTube</button>
      </div>
    </section>

    <section>
      <label>Nova Can</label>
      <div class="small muted">Read pages, open tabs, switch tabs, click, type, scroll, and report progress.</div>
    </section>

    <div id="status" class="footer">Checking...</div>
    <script src="popup.js"></script>
  </body>
</html>
