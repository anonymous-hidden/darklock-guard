# ============================================================
# Home AI Assistant - Master Configuration
# ============================================================
# SECURITY: This file controls all system behavior.
# Do NOT allow the AI to modify this file.
# ============================================================

ai:
  provider: "ollama"
  model: "llama3.2:3b"
  # Ollama runs locally — no API key needed
  # Make sure `ollama serve` is running before starting Home AI
  max_tokens: 4096
  temperature: 0.7
  system_prompt: |
    You are a helpful home assistant AI. You interpret user requests
    and output structured JSON commands for the backend to execute.
    You NEVER execute commands yourself. You NEVER access SSH directly.
    You NEVER call external APIs directly. You always output structured
    command JSON that the backend validates and executes on your behalf.

    PROJECT MANAGEMENT — you can control Darklock via run_script:
    The following scripts are available in the scripts directory:

    - darklock-status.sh   → check if Darklock is running, show logs and ports
    - darklock-start.sh    → start Darklock
    - darklock-stop.sh     → stop / shut down Darklock
    - darklock-restart.sh  → restart Darklock
    - darklock-logs.sh     → show recent Darklock logs (read-only, no approval needed)

    When the user says things like:
      "shut down darklock", "stop darklock", "is darklock running",
      "start darklock", "restart darklock", "show darklock logs",
      "check my project", "what's the status of my app"
    use run_script with the appropriate script_name above.

    Always tell the user what action you are taking before running the script.

permissions:
  # Risk levels: low (auto-execute), medium (confirm), high (manual approval)
  default_risk: "medium"
  require_approval_for:
    - "high"
    - "medium"
  auto_approve:
    - "low"

# Whitelisted commands the AI can request
commands:
  allowed:
    - name: "get_system_status"
      risk: "low"
      description: "Get local system CPU, memory, disk usage"
    - name: "get_time"
      risk: "low"
      description: "Get current date and time"
    - name: "list_files"
      risk: "low"
      description: "List files in a whitelisted directory"
    - name: "read_file"
      risk: "medium"
      description: "Read contents of a whitelisted file"
    - name: "run_script"
      risk: "high"
      description: "Run a pre-approved script"
    - name: "ssh_command"
      risk: "high"
      description: "Execute a whitelisted command on a remote host"
    - name: "restart_service"
      risk: "high"
      description: "Restart a whitelisted system service"
    - name: "send_notification"
      risk: "low"
      description: "Send a notification message"
    - name: "web_search"
      risk: "medium"
      description: "Search the web for information"
    - name: "smart_home_control"
      risk: "medium"
      description: "Control smart home devices"

# Whitelisted directories for file operations
filesystem:
  allowed_paths:
    - "/home/cayden/documents"
    - "/home/cayden/notes"
    - "/home/cayden/darklock"              # Darklock project root
    - "/home/cayden/darklock/apps/server" # Darklock server logs + data
    - "/tmp/home-ai"
  blocked_paths:
    - "/etc"
    - "/root"
    - "/var"
    - "/home/cayden/home ai"  # Prevent self-modification

# SSH configuration
ssh:
  enabled: true
  key_path: "~/.ssh/home_ai_key"
  allowed_hosts:
    - host: "192.168.1.100"
      name: "home-server"
      user: "cayden"
      allowed_commands:
        - "uptime"
        - "df -h"
        - "free -m"
        - "systemctl status"
        - "docker ps"
    - host: "192.168.1.101"
      name: "nas"
      user: "cayden"
      allowed_commands:
        - "uptime"
        - "df -h"
  connection_timeout: 10
  command_timeout: 30

# API server
api:
  host: "127.0.0.1"
  port: 8900
  # Generate with: python -c "import secrets; print(secrets.token_urlsafe(32))"
  # Set HOME_AI_API_KEY environment variable
  require_auth: true
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"

# Logging
logging:
  level: "INFO"
  local_path: "/home/cayden/home ai/logs"
  max_file_size_mb: 50
  rotation_count: 10
  log_user_input: true
  log_ai_responses: true
  log_commands: true
  log_execution_results: true
  log_errors: true

# Self-improvement / Learning
learning:
  enabled: true
  # The AI improves by learning user preferences, tracking command
  # success/failure, and remembering corrections. All learning data
  # is stored in learning.db (SQLite) — never in code.
  # Every learning event is logged and backed up.
  # Owner can review, edit, pause, or wipe all learned data.
  db_path: "learning.db"
  max_memories: 5000
  max_feedback: 10000
  max_command_outcomes: 50000
  max_conversation_summaries: 1000

# Log cleanup / auto-rotation
log_cleanup:
  enabled: true
  interval_hours: 24           # Run cleanup every 24 hours
  log_retention_days: 7        # Delete log files older than 7 days
  structured_max_mb: 20        # Trim structured.jsonl to 20 MB max
  backup_retention_days: 30    # Delete backup .json files older than 30 days
  db_backup_retention_days: 60 # Delete .db.gz backups older than 60 days
  clean_pycache: true          # Clear __pycache__ on each run
  compress_old_logs: true      # Gzip logs older than (retention - 3) days before deleting

# Remote backup logging
backup:
  enabled: true
  method: "https"  # "https" or "ssh"
  # For HTTPS backup
  remote_url: "https://backup.example.com/logs"
  # Set HOME_AI_BACKUP_KEY environment variable
  # For SSH backup
  ssh_host: "192.168.1.200"
  ssh_user: "logbackup"
  ssh_key_path: "~/.ssh/backup_key"
  remote_log_path: "/var/log/home-ai-backup"
  send_interval_seconds: 60
  retry_count: 3

# Watchdog
watchdog:
  enabled: true
  check_interval_seconds: 30
  max_log_gap_seconds: 300  # If no log entry for 5 min, alert
  shutdown_on_anomaly: true
  health_check_endpoints:
    - "http://127.0.0.1:8900/health"

# Voice settings
voice:
  enabled: true
  stt_engine: "whisper"  # Speech-to-text engine
  tts_engine: "pyttsx3"  # Text-to-speech engine
  wake_word: "hey assistant"
  silence_timeout: 3
  sample_rate: 16000

# Web UI
ui:
  enabled: true
  host: "127.0.0.1"
  port: 3000
