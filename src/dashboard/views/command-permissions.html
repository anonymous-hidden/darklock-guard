<!DOCTYPE html>
<html lang="en">
<head>

    <style>html,body{background:#0a0a0f!important;color-scheme:dark}</style>
    <meta name="color-scheme" content="dark">
    <!--dl-pt-boot-->
    <script>
    (function(){
        var s=document.createElement('style');
        s.textContent='html,body{background:#0a0a0f!important;margin:0}#dl-pt-boot{position:fixed;inset:0;z-index:99999;background:#0a0a0f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif}#dl-pt-boot svg{animation:_ptpulse 1.6s ease-in-out infinite}#dl-pt-bt{width:140px;height:3px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}#dl-pt-bb{height:100%;width:35%;background:linear-gradient(90deg,transparent,#00d4ff,transparent);border-radius:99px;animation:_ptslide 1.1s ease-in-out infinite}#dl-pt-bn{color:#fff;font-size:1.1rem;font-weight:700;letter-spacing:.07em}@keyframes _ptslide{0%{transform:translateX(-140px)}100%{transform:translateX(380px)}}@keyframes _ptpulse{0%,100%{filter:drop-shadow(0 0 7px rgba(0,212,255,.4))}50%{filter:drop-shadow(0 0 18px rgba(0,212,255,.75))}}';
        document.head.appendChild(s);
        var d=document.createElement('div');d.id='dl-pt-boot';
        d.innerHTML='<svg width="48" height="48" viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="13" fill="rgba(0,212,255,0.1)"/><path d="M26 10 L40 18 L40 34 L26 42 L12 34 L12 18 Z" fill="none" stroke="#00d4ff" stroke-width="2.4" stroke-linejoin="round"/><path d="M26 18 L33 22 L33 30 L26 34 L19 30 L19 22 Z" fill="rgba(0,212,255,0.13)" stroke="#00d4ff" stroke-width="1.4"/><circle cx="26" cy="26" r="2.8" fill="#00d4ff"/></svg><div id="dl-pt-bn">DarkLock</div><div id="dl-pt-bt"><div id="dl-pt-bb"></div></div>';
        document.documentElement.appendChild(d);
        window._DLBootHide=function(){var e=document.getElementById('dl-pt-boot');if(e){e.style.transition='opacity .3s ease';e.style.opacity='0';setTimeout(function(){e&&e.remove()},350);}};
        window.addEventListener('load',function(){setTimeout(window._DLBootHide,60)});
    })();
</script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Command Permissions</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link id="dynamic-theme-stylesheet" rel="stylesheet" href="/api/v4/admin/theme/css">
  <script src="/js/global-theme.js"></script>
    <script src="/js/theme-effects.js"></script>
    <link rel="stylesheet" href="/css/darklock-fx.css">
    <script src="/js/darklock-fx.js" defer></script>
    <link rel="stylesheet" href="/css/settings-panel.css">
    <script src="/js/settings-panel.js"></script>
    <style>
      .permissions-toolbar {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
        margin: 1rem 0;
      }
      .permissions-toolbar input[type="search"] {
        min-width: 260px;
        padding: 0.5rem 0.7rem;
      }
      .toggle-wrap {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        font-weight: 600;
      }
      .legacy-help {
        margin: 0.25rem 0 0.75rem;
        opacity: 0.85;
        font-size: 0.95rem;
      }
      .hidden-legacy-hint {
        display: none;
        margin: 0.35rem 0 0.8rem;
        color: #f3c97a;
        font-size: 0.92rem;
      }
      .permission-row-legacy {
        opacity: 0.78;
        border-left: 3px solid #9b7a3d;
        padding-left: 0.5rem;
      }
      .legacy-badge {
        display: inline-block;
        font-size: 0.7rem;
        background: #5a4a2f;
        color: #f6ddae;
        border: 1px solid #9b7a3d;
        border-radius: 999px;
        padding: 0.05rem 0.4rem;
        vertical-align: middle;
      }
      .legacy-meta {
        margin-top: 0.2rem;
        color: #d7b97a;
        font-size: 0.86rem;
        font-style: italic;
      }
    </style>
</head>
<body>
  <div class="container">
    <h1>Command Permissions</h1>
    <p>Choose which roles can use which commands. Server owners can grant per-command or per-group access.</p>

    <div class="permissions-toolbar">
      <input id="commandSearch" type="search" placeholder="Search commands, aliases, and moved targets">
      <label class="toggle-wrap" for="showLegacyCommands">
        <input id="showLegacyCommands" type="checkbox">
        Show legacy commands
      </label>
    </div>
    <p class="legacy-help">Legacy commands still work, but have moved to consolidated commands like /mod, /security, /setup, and /ticket.</p>
    <p id="hiddenLegacyHint" class="hidden-legacy-hint"></p>

    <div id="permissions-area">
      <div id="loading">Loading…</div>
    </div>

    <div style="margin-top:1.5rem;">
      <button id="saveBtn" class="btn btn-primary">Save Permissions</button>
    </div>
  </div>

    <script src="/js/secure-auth.js"></script>
<script src="/js/command-permissions.js" defer></script>
</body>
</html>
