# =============================================================================
# Redis Configuration — Hardened for Security Pipeline
# Binds to Unix socket ONLY — no TCP network access
# =============================================================================

# --- Network: Unix socket only, no TCP ---
port 0
unixsocket /var/run/redis/redis.sock
unixsocketperm 770

# Explicitly deny all TCP
bind 127.0.0.1
protected-mode yes

# --- Authentication ---
# CHANGE THIS — generate with: openssl rand -base64 32
requirepass CHANGE_ME_GENERATE_WITH_openssl_rand_base64_32

# --- Disable dangerous commands ---
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG "CONFIG_b7f3a92c"
rename-command DEBUG ""
rename-command SLAVEOF ""
rename-command REPLICAOF ""
rename-command SHUTDOWN "SHUTDOWN_d4e8f1a2"
rename-command KEYS "KEYS_c9d2e5f8"
rename-command EVAL ""
rename-command EVALSHA ""
rename-command SCRIPT ""

# --- Persistence: AOF (append-only file) ---
# Events survive a Redis restart
appendonly yes
appendfilename "security-pipeline.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots as backup
save 900 1
save 300 10
save 60 10000
dbfilename security-pipeline.rdb
dir /var/lib/redis

# --- Memory limits ---
maxmemory 256mb
maxmemory-policy noeviction

# --- Logging ---
loglevel notice
logfile /var/log/redis/security-pipeline.log

# --- Security ---
# Disable Lua scripting (attack surface reduction)
# Already disabled above via rename-command

# Limit client connections
maxclients 100

# Timeout idle connections after 5 min
timeout 300

# TCP keepalive
tcp-keepalive 60

# Disable background processes that could be exploited
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
