# =============================================================================
# Vector Aggregator Configuration — Central server
# Receives logs from all agents over TLS, stores locally
# =============================================================================

data_dir = "/var/lib/vector-aggregator"

# ============================================================================
# SOURCE — Receive from all Vector agents
# ============================================================================

[sources.agents]
type = "vector"
address = "0.0.0.0:9000"
version = "2"

[sources.agents.tls]
enabled = true
ca_file = "/etc/vector/certs/ca.crt"
crt_file = "/etc/vector/certs/aggregator.crt"
key_file = "/etc/vector/certs/aggregator.key"
verify_certificate = true

# ============================================================================
# TRANSFORMS — Additional processing at aggregator level
# ============================================================================

# Add received timestamp and deduplicate
[transforms.enrich]
type = "remap"
inputs = ["agents"]
source = '''
.received_at = now()
# Ensure all required fields exist
.timestamp = .timestamp || now()
.source_host = .source_host || "unknown"
.service = .service || "unknown"
.severity = .severity || "info"
.raw_message = .raw_message || ""
'''

# Route by severity for different retention
[transforms.route_severity]
type = "route"
inputs = ["enrich"]
[transforms.route_severity.route]
critical = '.severity == "critical"'
warning = '.severity == "warning"'
info = '.severity == "info"'

# ============================================================================
# SINKS — Local storage (file + SQLite)
# ============================================================================

# --- All events to JSONL files (partitioned by date + host) ---
[sinks.all_events_file]
type = "file"
inputs = ["enrich"]
path = "/var/log/vector-aggregator/all/%Y-%m-%d/{{ source_host }}.jsonl"
encoding.codec = "json"

# --- Critical events to separate file (fast access) ---
[sinks.critical_file]
type = "file"
inputs = ["route_severity.critical"]
path = "/var/log/vector-aggregator/critical/%Y-%m-%d.jsonl"
encoding.codec = "json"

# --- Warning events ---
[sinks.warning_file]
type = "file"
inputs = ["route_severity.warning"]
path = "/var/log/vector-aggregator/warning/%Y-%m-%d.jsonl"
encoding.codec = "json"

# --- Info events ---
[sinks.info_file]
type = "file"
inputs = ["route_severity.info"]
path = "/var/log/vector-aggregator/info/%Y-%m-%d.jsonl"
encoding.codec = "json"

# --- HTTP endpoint for the 8B triage service to consume ---
[sinks.triage_http]
type = "http"
inputs = ["enrich"]
uri = "http://127.0.0.1:8089/ingest"
method = "post"
encoding.codec = "json"
[sinks.triage_http.batch]
max_events = 50
timeout_secs = 3

