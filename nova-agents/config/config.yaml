# nova-agents: config.yaml
# Global runtime configuration for the NOVA multi-agent system.

ollama:
  host: "http://localhost:11434"
  # Global default model; agents may override.
  default_model: "llama3.1:8b"
  timeout_seconds: 180
  # Passed verbatim to Ollama /api/chat options.
  options:
    temperature: 0.2
    top_p: 0.9
    num_ctx: 8192

orchestrator:
  # Hard cap on supervisor loop iterations.
  max_iterations: 6
  # Max retries when an agent returns invalid structured output.
  max_validation_retries: 2
  # If false, the supervisor will always plan/delegate. If true, it may
  # answer trivial requests directly without invoking specialists.
  allow_direct_answer: true

safety:
  # "safe" | "approval" | "permissive"
  # safe       -> only allowlisted read-only shell commands
  # approval   -> any command, but risky ones require human y/N
  # permissive -> no prompts (NOT recommended)
  shell_mode: "approval"
  shell_allowlist:
    - "ls"
    - "pwd"
    - "cat"
    - "head"
    - "tail"
    - "wc"
    - "grep"
    - "find"
    - "echo"
    - "which"
    - "whoami"
    - "uname"
    - "date"
    - "df"
    - "du"
    - "ps"
    - "git"
    - "python3"
    - "node"
  shell_denylist_patterns:
    - "rm\\s+-rf"
    - "\\bshutdown\\b"
    - "\\breboot\\b"
    - "\\bmkfs\\b"
    - "\\bdd\\b\\s+if="
    - "chmod\\s+-R\\s+.*/(etc|usr|bin|boot)"
    - "curl\\s+[^|]*\\|\\s*(sh|bash|zsh)"
    - "wget\\s+[^|]*\\|\\s*(sh|bash|zsh)"
    - ":\\(\\)\\s*\\{.*\\};:"     # fork bomb
    - "\\bsudo\\b"
  # Hard ceiling on shell output bytes returned to agents.
  shell_max_output_bytes: 16384
  shell_timeout_seconds: 20

  # Filesystem sandbox for read_file / write_file / list_dir.
  # All paths resolved and must live under one of these roots.
  fs_allowed_roots:
    - "."
    - "~/"
  fs_denied_patterns:
    - "\\.ssh/"
    - "\\.gnupg/"
    - "\\.aws/"
    - "\\.env$"
    - "/etc/shadow"
    - "id_rsa"
  fs_max_read_bytes: 262144     # 256 KB
  fs_max_write_bytes: 262144

memory:
  path: "./data/memory.sqlite"

logging:
  path: "./logs/nova.jsonl"
  level: "INFO"
  # If true, also print pretty logs to stderr.
  console: true

terminal:
  verbose: false
  stream: false
  show_plan: true
  show_tool_calls: true
