<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ridgeline Shop</title>
  <style>
    :root {
      --bg: #0f1118;
      --bg-2: #171b25;
      --card: #1f2430;
      --line: #2e3546;
      --text: #eef2ff;
      --muted: #95a1bf;
      --accent: #5f7dff;
      --accent-2: #7e5fff;
      --good: #35d07f;
      --danger: #f97373;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(1100px 480px at 100% -10%, rgba(126,95,255,.2), transparent 55%),
        radial-gradient(900px 420px at 0% -20%, rgba(95,125,255,.2), transparent 60%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 18px 12px 64px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .title {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 750;
      letter-spacing: .2px;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: .86rem;
    }

    .chip {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.02);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .74rem;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      overflow: hidden;
    }

    .head {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(140deg, rgba(95,125,255,.2), rgba(126,95,255,.18));
    }

    .badge {
      display: inline-block;
      font-size: .68rem;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.2);
      color: #fff;
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .name {
      margin: 0;
      font-size: 1rem;
      font-weight: 740;
    }

    .desc {
      margin: 4px 0 0;
      color: rgba(238,242,255,.88);
      font-size: .83rem;
      line-height: 1.4;
    }

    .body {
      padding: 12px;
    }

    .features {
      margin: 0 0 10px;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 6px;
    }

    .features li {
      color: var(--muted);
      font-size: .83rem;
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--good);
      flex-shrink: 0;
    }

    .buy {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .price {
      font-size: 1.18rem;
      font-weight: 790;
      letter-spacing: .2px;
    }

    .price small {
      color: var(--muted);
      font-size: .72rem;
      font-weight: 600;
      margin-left: 4px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .qty {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg-2);
      height: 34px;
    }

    .qty button {
      border: 0;
      background: transparent;
      color: var(--text);
      width: 30px;
      height: 34px;
      cursor: pointer;
      font-size: 1rem;
    }

    .qty span {
      width: 24px;
      text-align: center;
      color: var(--text);
      font-size: .84rem;
      font-weight: 650;
    }

    .btn {
      height: 34px;
      border: 0;
      border-radius: 10px;
      padding: 0 13px;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      font-size: .79rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .msg {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: .8rem;
    }

    .msg.err { color: var(--danger); }

    .empty {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.02);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <div>
        <h1 class="title">Ridgeline Shop</h1>
        <p class="subtitle">Mobile-first catalog styled like a clean community storefront.</p>
      </div>
      <span class="chip">Secure Stripe Checkout</span>
    </header>

    <section id="shopGrid" class="grid"></section>
    <p id="status" class="msg"></p>
  </main>

  <script>
    const state = {
      items: [],
      qty: {},
      loading: false,
    };

    const getCsrfToken = () => {
      const m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
      return m ? decodeURIComponent(m[1]) : '';
    };

    const fmtPrice = (cents, currency = 'usd') => {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: currency.toUpperCase() }).format((cents || 0) / 100);
    };

    function intervalLabel(kind) {
      if (kind === 'month') return '/month';
      if (kind === 'year') return '/year';
      return 'one-time';
    }

    function setStatus(text, isErr = false) {
      const el = document.getElementById('status');
      el.textContent = text || '';
      el.className = isErr ? 'msg err' : 'msg';
    }

    function getQty(id) {
      return Math.max(1, Math.min(Number(state.qty[id] || 1), 10));
    }

    function setQty(id, next) {
      state.qty[id] = Math.max(1, Math.min(Number(next) || 1, 10));
      render();
    }

    async function checkout(itemId) {
      if (state.loading) return;
      state.loading = true;
      render();
      setStatus('Starting secure checkout...');

      try {
        const res = await fetch('/platform/premium/shop/checkout', {
          method: 'POST',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json',
            ...(getCsrfToken() ? { 'X-CSRF-Token': getCsrfToken() } : {}),
          },
          body: JSON.stringify({ itemId, quantity: getQty(itemId) }),
        });

        if (res.status === 401) {
          const next = encodeURIComponent('/platform/shop');
          location.href = `/platform/auth/login?next=${next}`;
          return;
        }

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.url) {
          throw new Error(data.error || 'Unable to start checkout');
        }

        location.href = data.url;
      } catch (err) {
        setStatus(err.message || 'Checkout failed', true);
      } finally {
        state.loading = false;
        render();
      }
    }

    function render() {
      const root = document.getElementById('shopGrid');
      if (!state.items.length) {
        root.innerHTML = '<div class="empty">No published items yet. Check back soon.</div>';
        return;
      }

      root.innerHTML = state.items.map((item) => {
        const qty = getQty(item.id);
        const total = item.price_cents * qty;
        const featureList = Array.isArray(item.features) ? item.features : [];
        return `
          <article class="item">
            <div class="head">
              ${item.badge ? `<span class="badge">${item.badge}</span>` : ''}
              <h2 class="name">${item.title}</h2>
              <p class="desc">${item.subtitle || item.description || 'Premium Ridgeline add-on.'}</p>
            </div>
            <div class="body">
              ${featureList.length ? `<ul class="features">${featureList.map((f) => `<li><span class="dot"></span><span>${f}</span></li>`).join('')}</ul>` : ''}
              <div class="buy">
                <div class="price">${fmtPrice(total, item.currency)}<small>${intervalLabel(item.billing_type)}</small></div>
                <div class="controls">
                  <div class="qty">
                    <button onclick="setQty('${item.id}', ${qty - 1})" aria-label="decrease quantity">−</button>
                    <span>${qty}</span>
                    <button onclick="setQty('${item.id}', ${qty + 1})" aria-label="increase quantity">+</button>
                  </div>
                  <button class="btn" ${state.loading ? 'disabled' : ''} onclick="checkout('${item.id}')">Buy</button>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    async function boot() {
      const q = new URLSearchParams(location.search);
      if (q.get('checkout') === 'success') {
        setStatus('Payment complete. Your purchase is being finalized.');
      } else if (q.get('checkout') === 'cancelled') {
        setStatus('Checkout cancelled. No charge was made.');
      }

      try {
        const res = await fetch('/api/v4/admin/shop/public?app=ridgeline', { credentials: 'include' });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'Could not load shop');
        state.items = Array.isArray(data.items) ? data.items : [];
      } catch (err) {
        setStatus(err.message || 'Failed to load shop catalog', true);
      }

      render();
    }

    boot();
  </script>
</body>
</html>
