    `;

    if (ticketsSubTab === 'tickets')   renderTicketsList();
    if (ticketsSubTab === 'blacklist') renderTicketsBlacklist();
    if (ticketsSubTab === 'settings')  renderTicketsSettings();

  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="empty-state"><h4>Failed to load tickets</h4><p>${esc(err.message)}</p></div>`;
  }
}

async function renderTicketsList() {
  const sub = document.getElementById('ticketsSubContent');
  if (!sub) return;
  sub.innerHTML = '<div class="loading">Loading...</div>';

  const priorityColors = { urgent:'var(--red)', high:'var(--yellow)', normal:'var(--blue)', low:'var(--text-muted)' };
  const statusBadge = s => {
    const m = { open:'green', closed:'red', claimed:'yellow', resolved:'blue' };
    return `<span class="badge badge-${m[s]||'gray'}">${s}</span>`;
  };

  try {
    const params = new URLSearchParams({ page: ticketsPage+1, limit: 20 });
    if (ticketsFilter.status)   params.set('status',   ticketsFilter.status);
    if (ticketsFilter.priority) params.set('priority', ticketsFilter.priority);
    if (ticketsFilter.guild)    params.set('guild_id', ticketsFilter.guild);
    if (ticketsFilter.search)   params.set('search',   ticketsFilter.search);

    const d = await api(`/tickets?${params}`);
    const total  = d.pagination?.total || 0;
    const pages  = d.pagination?.pages || 1;

    sub.innerHTML = `
      <div class="card">
        <div class="card-header">
          <h3>🎫 Tickets <span style="font-size:.75rem;font-weight:400;color:var(--text-muted)">${total} total</span></h3>
          <button class="btn btn-secondary btn-sm" onclick="renderTicketsList()" title="Refresh">🔄 Refresh</button>
        </div>
        <div style="padding:.75rem 1.25rem;display:flex;flex-wrap:wrap;gap:.5rem;border-bottom:1px solid var(--border);align-items:center">
          <input class="form-input" style="width:200px" placeholder="Search user, subject…" value="${esc(ticketsFilter.search)}"
            onkeydown="if(event.key==='Enter'){ticketsFilter.search=this.value;ticketsPage=0;renderTicketsList()}">
          ${['', 'open', 'claimed', 'closed', 'resolved'].map(s => `<button class="filter-chip${ticketsFilter.status===s?' active':''}" onclick="ticketsFilter.status='${s}';ticketsPage=0;renderTicketsList()">${s||'All Status'}</button>`).join('')}
          ${['', 'urgent', 'high', 'normal', 'low'].map(p => `<button class="filter-chip${ticketsFilter.priority===p?' active':''}" onclick="ticketsFilter.priority='${p}';ticketsPage=0;renderTicketsList()">${p||'All Priority'}</button>`).join('')}
          <input class="form-input" style="width:160px" placeholder="Guild ID filter" value="${esc(ticketsFilter.guild)}"
            onkeydown="if(event.key==='Enter'){ticketsFilter.guild=this.value;ticketsPage=0;renderTicketsList()}">
        </div>
        <div style="overflow-x:auto">
          <table class="table">
            <thead><tr>
              <th>ID</th><th>User</th><th>Guild</th><th>Category</th>
              <th>Status</th><th>Priority</th><th>Created</th><th>Actions</th>
            </tr></thead>
            <tbody>
              ${(d.tickets||[]).length === 0 ? '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-muted)">No tickets found</td></tr>' :
                (d.tickets||[]).map(t => `<tr>
                  <td><span style="font-family:monospace;font-size:.8rem">#${t.id}</span></td>
                  <td>${esc(t.user_tag||t.user_id)} ${t.escalated?'🔺':''} ${t.locked?'🔒':''}</td>
                  <td><span style="font-size:.75rem;color:var(--text-muted)">${esc(t.guild_id||'—')}</span></td>
                  <td>${esc(t.category||'—')}</td>
                  <td>${statusBadge(t.status)}</td>
                  <td><span style="color:${priorityColors[t.priority]||'var(--text)'};font-weight:600">${(t.priority||'normal').toUpperCase()}</span></td>
                  <td>${fmtDateTime(t.created_at)}</td>
                  <td style="white-space:nowrap">
                    <button class="btn btn-secondary btn-sm" onclick="openTicketDetail('${esc(String(t.id))}')">View</button>
                    ${t.status==='open'||t.status==='claimed' ? `<button class="btn btn-sm" style="background:var(--red-dim);color:var(--red)" onclick="changeTicketStatus('${esc(String(t.id))}','closed')">Close</button>` : ''}
                    ${t.status==='closed'||t.status==='resolved' ? `<button class="btn btn-sm" style="background:var(--green-dim);color:var(--green)" onclick="changeTicketStatus('${esc(String(t.id))}','open')">Reopen</button>` : ''}
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
        <div class="card-body" style="display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem">
          <span style="font-size:.8rem;color:var(--text-muted)">${total} total • Page ${ticketsPage+1} of ${pages}</span>
          <div style="display:flex;gap:.5rem">
            <button class="btn btn-secondary btn-sm" ${ticketsPage===0?'disabled':''} onclick="ticketsPage--;renderTicketsList()">‹ Prev</button>
            <button class="btn btn-secondary btn-sm" ${ticketsPage>=pages-1?'disabled':''} onclick="ticketsPage++;renderTicketsList()">Next ›</button>
          </div>
        </div>
      </div>
    `;
  } catch (err) {
    sub.innerHTML = `<div class="empty-state"><h4>Failed to load</h4><p>${esc(err.message)}</p></div>`;
  }
}

    const notes = d.notes || [];
    const priorityColors = { urgent:'var(--red)', high:'var(--yellow)', normal:'var(--blue)', low:'var(--text-muted)' };

    openModal(`Ticket #${t.id} — ${esc(t.user_tag || t.user_id)}`,
      `<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
        <div class="form-group"><label class="form-label">Status</label>

async function changeTicketStatus(id, status, noRefresh) {
  const reason = prompt(`Reason for ${status} (optional):`) || '';
  try {
    await api(`/tickets/${id}/status`, { method: 'PUT', body: JSON.stringify({ status, reason }) });
    toast(`Ticket ${status}`, 'success');
    if (!noRefresh) renderTicketsList();
  } catch (err) {
    toast('Failed: ' + err.message, 'error');
  }
}

async function changeTicketPriority(id, priority) {
  try {
    await api(`/tickets/${id}/priority`, { method: 'PUT', body: JSON.stringify({ priority }) });
    toast(`Priority set to ${priority}`, 'success');
  } catch (err) {
    toast('Failed: ' + err.message, 'error');
  }
}

async function addTicketNote(id) {
  const content = document.getElementById('tkNoteInput')?.value?.trim();
  if (!content) return toast('Note cannot be empty', 'error');
  try {
    await api(`/tickets/${id}/note`, { method: 'POST', body: JSON.stringify({ content }) });
    toast('Note added', 'success');
    document.getElementById('tkNoteInput').value = '';
    openTicketDetail(id);
  } catch (err) {
    toast('Failed: ' + err.message, 'error');
  }
}

function showAddBlacklist(guildId = '', userId = '') {
  openModal('Add to Ticket Blacklist',
    `<div class="form-group"><label class="form-label">Guild ID</label><input class="form-input" id="blGuildId" value="${esc(guildId)}" placeholder="Discord Guild ID"></div>
     <div class="form-group"><label class="form-label">User ID</label><input class="form-input" id="blUserId" value="${esc(userId)}" placeholder="Discord User ID"></div>
     <div class="form-group"><label class="form-label">Reason</label><input class="form-input" id="blReason" placeholder="Why is this user blacklisted?"></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="submitAddBlacklist()">Add to Blacklist</button>`
  );
}

async function addToBlacklist(guildId, userId) {
  showAddBlacklist(guildId, userId);
}

async function submitAddBlacklist() {
  const guild_id = document.getElementById('blGuildId')?.value?.trim();
  const user_id  = document.getElementById('blUserId')?.value?.trim();
  const reason   = document.getElementById('blReason')?.value?.trim();
  if (!guild_id || !user_id) return toast('Guild ID and User ID are required', 'error');
  try {
    await api('/tickets/blacklist/add', { method: 'POST', body: JSON.stringify({ guild_id, user_id, reason }) });
    toast('User blacklisted', 'success');
    closeModal();
    renderTicketsBlacklist();
  } catch (err) {
    toast('Failed: ' + err.message, 'error');
  }
}

async function removeBlacklist(guildId, userId) {
  if (!confirm(`Remove ${userId} from ticket blacklist for guild ${guildId}?`)) return;
  try {
    await api(`/tickets/blacklist/${encodeURIComponent(guildId)}/${encodeURIComponent(userId)}`, { method: 'DELETE' });
    toast('Removed from blacklist', 'success');
    renderTicketsBlacklist();
  } catch (err) {
    toast('Failed: ' + err.message, 'error');
  }
}

    allow_user_close:     g('ts_allow_user_close')?.checked ? 1 : 0,
    dm_on_close:          g('ts_dm_on_close')?.checked ? 1 : 0,
    dm_on_update:         g('ts_dm_on_update')?.checked ? 1 : 0,
    close_confirmation:   g('ts_close_confirmation')?.checked ? 1 : 0,
    severity_enabled:     g('ts_severity_enabled')?.checked ? 1 : 0,
    panel_description:    g('ts_panel_description')?.value?.trim() || null,
  };
  try {
    await api(`/tickets/settings/${guildId}`, { method: 'PUT', body: JSON.stringify(payload) });
    toast('Settings saved', 'success');
  } catch (err) {
    toast('Failed: ' + err.message, 'error');
  }
}

async function signOut() {
  try {
    await fetch('/signout', { method: 'POST', credentials: 'include', headers: { 'X-CSRF-Token': getCSRFToken() } });
  } catch (e) { /* ignore */ }
  window.location.href = '/signin';
}

// ── Init ────────────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
