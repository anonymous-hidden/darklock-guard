<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darklock Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
<style>
/* ═══════════════════════════════════════════════════════════════════════════════
   DARKLOCK ADMIN v4 — STYLESHEET
   Enterprise-grade dark-theme admin dashboard
   ═══════════════════════════════════════════════════════════════════════════════ */

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-body:#08090d;--bg-sidebar:#0e1015;--bg-card:#12141b;--bg-input:#181b24;
  --bg-hover:#1a1d28;--bg-active:#1e2130;--bg-overlay:rgba(0,0,0,.65);
  --border:#1f2233;--border-hover:#2a2e44;
  --accent:#6366f1;--accent-dim:rgba(99,102,241,.12);--accent-hover:#7c3aed;
  --text:#e8eaed;--text-secondary:#9ca0b0;--text-muted:#636880;
  --green:#22c55e;--green-dim:rgba(34,197,94,.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,.12);
  --yellow:#f59e0b;--yellow-dim:rgba(245,158,11,.12);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.12);
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
  --transition:all .2s ease;
  --sidebar-width:260px;--sidebar-collapsed:68px;
  --font:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg-body);color:var(--text);min-height:100vh;overflow:hidden}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:.875rem}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hover)}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-width);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .25s ease;flex-shrink:0;overflow:hidden;z-index:50}
.sidebar.collapsed{width:var(--sidebar-collapsed)}
.sidebar.collapsed .sidebar-text{display:none}
.sidebar.collapsed .sidebar-header h1{display:none}
.sidebar.collapsed .sidebar-header p{display:none}
.sidebar.collapsed .sidebar-footer .admin-info span{display:none}
.sidebar.collapsed .nav-item{justify-content:center;padding-left:0;padding-right:0}
.sidebar.collapsed .nav-section-title{display:none}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--bg-sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:.75rem;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:1.75rem}

/* ── Sidebar internals ── */
.sidebar-header{padding:1.25rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem;min-height:64px}
.sidebar-header .logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-hover));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-header .logo svg{width:18px;height:18px;color:#fff}
.sidebar-header h1{font-size:.95rem;font-weight:700;color:var(--text);white-space:nowrap}
.sidebar-header p{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-top:1px}

.nav-section{padding:.75rem 0}
.nav-section-title{font-size:.6rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);padding:0 1rem;margin-bottom:.4rem;font-weight:600}
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.55rem 1rem;cursor:pointer;transition:var(--transition);font-size:.825rem;color:var(--text-secondary);border-left:3px solid transparent;white-space:nowrap}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent);font-weight:600}
.nav-item svg{width:18px;height:18px;flex-shrink:0}

.sidebar-footer{margin-top:auto;padding:1rem;border-top:1px solid var(--border)}
.admin-info{display:flex;align-items:center;gap:.6rem}
.admin-avatar{width:32px;height:32px;border-radius:8px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;font-size:.75rem;color:var(--accent)}
.admin-info span{font-size:.8rem;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Topbar ── */
.topbar-toggle{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);transition:var(--transition);color:var(--text-muted)}
.topbar-toggle:hover{background:var(--bg-hover);color:var(--text)}
.topbar-toggle svg{width:18px;height:18px}
.topbar-title{font-size:1.05rem;font-weight:700;color:var(--text)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}
.topbar-badge{font-size:.7rem;padding:.2rem .6rem;border-radius:12px;background:var(--accent-dim);color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.4px}

/* ── Cards ── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--border-hover)}
.card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:.9rem;font-weight:600;display:flex;align-items:center;gap:.5rem}
.card-body{padding:1.25rem}

/* ── Stat cards ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;transition:var(--transition)}
.stat-card:hover{border-color:var(--border-hover);transform:translateY(-1px)}
.stat-card .stat-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:.5rem}
.stat-card .stat-value{font-size:1.75rem;font-weight:700;line-height:1}
.stat-card .stat-value.text-accent{color:var(--accent)}
.stat-card .stat-value.text-green{color:var(--green)}
.stat-card .stat-value.text-yellow{color:var(--yellow)}
.stat-card .stat-value.text-red{color:var(--red)}
.stat-card .stat-value.text-blue{color:var(--blue)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-radius:var(--radius-sm);font-size:.8rem;font-weight:600;transition:var(--transition);border:1px solid transparent}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-secondary{background:var(--bg-input);color:var(--text-secondary);border-color:var(--border)}
.btn-secondary:hover{background:var(--bg-hover);color:var(--text);border-color:var(--border-hover)}
.btn-danger{background:var(--red-dim);color:var(--red);border-color:rgba(239,68,68,.25)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-success{background:var(--green-dim);color:var(--green);border-color:rgba(34,197,94,.25)}
.btn-success:hover{background:var(--green);color:#fff}
.btn-sm{padding:.35rem .7rem;font-size:.75rem}
.btn-group{display:flex;gap:.5rem;flex-wrap:wrap}

/* ── Forms ── */
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:.75rem;font-weight:600;color:var(--text-secondary);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.55rem .75rem;color:var(--text);font-size:.85rem;transition:var(--transition);outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.form-textarea{resize:vertical;min-height:100px}
.form-select{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239ca0b0' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right .75rem center}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-toggle{display:flex;align-items:center;gap:.75rem}
.toggle-switch{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:var(--transition)}
.toggle-slider::before{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;background:var(--text-muted);border-radius:50%;transition:var(--transition)}
.toggle-switch input:checked+.toggle-slider{background:var(--accent);border-color:var(--accent)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(18px);background:#fff}

/* ── Tables ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.825rem}
thead th{text-align:left;padding:.65rem .75rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap}
tbody td{padding:.65rem .75rem;border-bottom:1px solid var(--border);color:var(--text-secondary);vertical-align:middle}
tbody tr:hover{background:var(--bg-hover)}
tbody tr:last-child td{border-bottom:none}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:.15rem .55rem;border-radius:10px;font-size:.7rem;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.badge-accent{background:var(--accent-dim);color:var(--accent)}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow)}
.badge-blue{background:var(--blue-dim);color:var(--blue)}
.badge-muted{background:rgba(99,108,128,.15);color:var(--text-muted)}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:var(--bg-overlay);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);width:90%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);transform:scale(.95);transition:transform .2s}
.modal-overlay.open .modal{transform:scale(1)}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1rem;font-weight:700}
.modal-close{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);transition:var(--transition);color:var(--text-muted)}
.modal-close:hover{background:var(--bg-hover);color:var(--text)}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.5rem}

/* ── Search bar ── */
.search-bar{display:flex;align-items:center;gap:.5rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 .75rem;transition:var(--transition)}
.search-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.search-bar svg{width:16px;height:16px;color:var(--text-muted);flex-shrink:0}
.search-bar input{background:none;border:none;outline:none;color:var(--text);padding:.5rem 0;font-size:.85rem;width:200px}

/* ── Filter bar ── */
.filter-bar{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:1.25rem}
.filter-chip{padding:.35rem .75rem;border-radius:16px;font-size:.75rem;font-weight:600;color:var(--text-muted);background:var(--bg-input);border:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.filter-chip:hover{color:var(--text);border-color:var(--border-hover)}
.filter-chip.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}

/* ── Pagination ── */
.pagination{display:flex;align-items:center;justify-content:space-between;padding-top:1rem;margin-top:1rem;border-top:1px solid var(--border)}
.pagination-info{font-size:.75rem;color:var(--text-muted)}
.pagination-buttons{display:flex;gap:.35rem}
.pagination-buttons button{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);background:var(--bg-input);border:1px solid var(--border);color:var(--text-secondary);font-size:.8rem;transition:var(--transition)}
.pagination-buttons button:hover:not(:disabled){background:var(--bg-hover);color:var(--text)}
.pagination-buttons button:disabled{opacity:.3;cursor:not-allowed}
.pagination-buttons button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Toast notifications ── */
.toast-container{position:fixed;top:1rem;right:1rem;z-index:2000;display:flex;flex-direction:column;gap:.5rem}
.toast{padding:.75rem 1.25rem;border-radius:var(--radius-sm);font-size:.825rem;font-weight:500;display:flex;align-items:center;gap:.5rem;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:toastIn .3s ease;max-width:380px}
.toast-success{background:#166534;color:#bbf7d0;border:1px solid rgba(34,197,94,.3)}
.toast-error{background:#7f1d1d;color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.toast-info{background:#1e3a5f;color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Misc ── */
.empty-state{text-align:center;padding:3rem;color:var(--text-muted)}
.empty-state svg{width:48px;height:48px;margin-bottom:1rem;opacity:.3}
.empty-state h4{font-size:1rem;color:var(--text-secondary);margin-bottom:.5rem}
.empty-state p{font-size:.85rem;max-width:340px;margin:0 auto}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--text-muted);gap:.5rem;font-size:.85rem}
.loading::before{content:'';width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--border);margin:1.5rem 0}
.text-accent{color:var(--accent)!important}
.text-green{color:var(--green)!important}
.text-red{color:var(--red)!important}
.text-yellow{color:var(--yellow)!important}
.text-muted{color:var(--text-muted)!important}
.mt-1{margin-top:.5rem}.mt-2{margin-top:1rem}.mt-3{margin-top:1.5rem}
.mb-1{margin-bottom:.5rem}.mb-2{margin-bottom:1rem}.mb-3{margin-bottom:1.5rem}
.flex{display:flex}.flex-between{display:flex;justify-content:space-between;align-items:center}
.gap-1{gap:.5rem}.gap-2{gap:1rem}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%)}
  .sidebar.mobile-open{transform:translateX(0)}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
  .content{padding:1rem}
  .ana-charts-grid{grid-template-columns:1fr!important}
  .ana-controls{flex-direction:column;align-items:stretch!important}
  .ana-health-grid{grid-template-columns:1fr!important}
}

/* ═══════════════════════════════════════════════════════════════════════════════
   ANALYTICS MODULE — Premium Dashboard System
   ═══════════════════════════════════════════════════════════════════════════════ */

/* Analytics controls bar */
.ana-controls{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:1.25rem}
.ana-time-btn{padding:.35rem .75rem;border-radius:16px;font-size:.72rem;font-weight:600;color:var(--text-muted);background:var(--bg-input);border:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.ana-time-btn:hover{color:var(--text);border-color:var(--border-hover)}
.ana-time-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.ana-time-btn.locked{opacity:.5;cursor:not-allowed;position:relative}
.ana-time-btn.locked::after{content:'🔒';font-size:.55rem;margin-left:.25rem}

/* Metric selector */
.ana-metric-select{display:flex;gap:.35rem;flex-wrap:wrap}
.ana-metric-chip{padding:.3rem .65rem;border-radius:14px;font-size:.68rem;font-weight:600;color:var(--text-muted);background:var(--bg-input);border:1px solid var(--border);cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;gap:.3rem}
.ana-metric-chip:hover{color:var(--text);border-color:var(--border-hover)}
.ana-metric-chip.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.ana-metric-chip.premium{border-color:var(--yellow);opacity:.65}
.ana-metric-chip.premium.unlocked{opacity:1;border-color:var(--yellow)}
.ana-metric-chip.premium::before{content:'★';color:var(--yellow);font-size:.6rem}
.ana-metric-chip.locked{cursor:not-allowed;opacity:.4}
.ana-metric-chip.locked::after{content:'🔒';font-size:.5rem;margin-left:.2rem}

/* Chart grid */
.ana-charts-grid{display:grid;gap:1rem;margin-bottom:1.5rem}
.ana-charts-grid.cols-2{grid-template-columns:repeat(2,1fr)}
.ana-charts-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.ana-charts-grid.fullwidth{grid-template-columns:1fr}
.ana-charts-grid.layout-compact .ana-chart-card{padding:.75rem}
.ana-charts-grid.layout-compact .ana-chart-card .card-header{padding:.5rem .75rem}
.ana-charts-grid.layout-compact .ana-chart-card .card-body{padding:.75rem}

/* Chart cards — glassmorphism */
.ana-chart-card{background:rgba(18,20,27,.85);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .3s,box-shadow .3s,transform .2s;backdrop-filter:blur(12px);position:relative}
.ana-chart-card:hover{border-color:var(--border-hover);box-shadow:0 8px 32px rgba(99,102,241,.08);transform:translateY(-1px)}
.ana-chart-card .card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ana-chart-card .card-header h3{font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:.5rem}
.ana-chart-card .card-body{padding:1.25rem;position:relative}
.ana-chart-card canvas{width:100%!important;max-height:280px}
.ana-chart-card .chart-type-switcher{display:flex;gap:.25rem}
.ana-chart-card .chart-type-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);background:transparent;border:1px solid transparent;color:var(--text-muted);cursor:pointer;transition:var(--transition);font-size:.65rem}
.ana-chart-card .chart-type-btn:hover{background:var(--bg-hover);color:var(--text)}
.ana-chart-card .chart-type-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.ana-chart-card .chart-type-btn.locked{opacity:.35;cursor:not-allowed}

/* Health cards row */
.ana-health-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.75rem;margin-bottom:1.25rem}
.ana-health-card{background:rgba(18,20,27,.85);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.15rem;backdrop-filter:blur(12px);transition:var(--transition);position:relative;overflow:hidden}
.ana-health-card:hover{border-color:var(--border-hover);transform:translateY(-1px)}
.ana-health-card .health-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:.65rem;font-size:1.1rem}
.ana-health-card .health-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:.3rem}
.ana-health-card .health-value{font-size:1.5rem;font-weight:700;line-height:1}
.ana-health-card .health-trend{font-size:.68rem;font-weight:600;margin-top:.35rem;display:flex;align-items:center;gap:.25rem}
.ana-health-card .health-trend.up{color:var(--green)}
.ana-health-card .health-trend.down{color:var(--red)}
.ana-health-card .health-trend.flat{color:var(--text-muted)}
.ana-health-card .health-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border)}
.ana-health-card .health-bar-fill{height:100%;border-radius:0 2px 0 0;transition:width .6s ease}

/* Risk gauge */
.ana-risk-gauge{width:120px;height:60px;position:relative;margin:0 auto}
.ana-risk-gauge canvas{width:100%;height:100%}
.ana-risk-gauge .gauge-value{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:1.1rem;font-weight:700}
.ana-risk-gauge .gauge-label{text-align:center;font-size:.65rem;color:var(--text-muted);margin-top:.25rem}

/* Event feed */
.ana-event-feed{max-height:320px;overflow-y:auto;padding-right:.25rem}
.ana-event-item{display:flex;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border);align-items:flex-start}
.ana-event-item:last-child{border-bottom:none}
.ana-event-dot{width:8px;height:8px;border-radius:50%;margin-top:.35rem;flex-shrink:0}
.ana-event-dot.green{background:var(--green)}
.ana-event-dot.red{background:var(--red)}
.ana-event-dot.yellow{background:var(--yellow)}
.ana-event-dot.blue{background:var(--blue)}
.ana-event-dot.accent{background:var(--accent)}
.ana-event-content{flex:1;min-width:0}
.ana-event-content .event-title{font-size:.8rem;font-weight:500}
.ana-event-content .event-time{font-size:.68rem;color:var(--text-muted);margin-top:.1rem}

/* Layout controls bar */
.ana-layout-bar{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
.ana-layout-btn{padding:.3rem .6rem;border-radius:var(--radius-sm);font-size:.7rem;font-weight:600;color:var(--text-muted);background:var(--bg-input);border:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.ana-layout-btn:hover{color:var(--text);border-color:var(--border-hover)}
.ana-layout-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}

/* Premium gate overlay */
.ana-premium-overlay{position:absolute;inset:0;background:rgba(8,9,13,.92);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;border-radius:var(--radius-lg)}
.ana-premium-overlay .premium-icon{font-size:2rem;margin-bottom:.75rem;opacity:.7}
.ana-premium-overlay .premium-title{font-size:.9rem;font-weight:700;color:var(--yellow);margin-bottom:.35rem}
.ana-premium-overlay .premium-desc{font-size:.75rem;color:var(--text-muted);text-align:center;max-width:220px;margin-bottom:.75rem}
.ana-premium-overlay .btn-upgrade{padding:.4rem 1rem;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--yellow),#f97316);color:#000;font-size:.75rem;font-weight:700;border:none;cursor:pointer;transition:var(--transition)}
.ana-premium-overlay .btn-upgrade:hover{transform:scale(1.04);box-shadow:0 4px 20px rgba(245,158,11,.3)}

/* Drag-and-drop sortable */
.ana-chart-card.dragging{opacity:.5;transform:scale(.97);border:2px dashed var(--accent)}
.ana-chart-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}

/* Custom chart builder modal */
.ana-builder-preview{background:var(--bg-body);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-top:1rem;min-height:180px;display:flex;align-items:center;justify-content:center}
.ana-builder-preview canvas{max-height:200px!important}
.ana-color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:.35rem;margin-top:.35rem}
.ana-color-swatch{width:24px;height:24px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:var(--transition)}
.ana-color-swatch:hover{transform:scale(1.15)}
.ana-color-swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}

/* Trend line animation */
@keyframes anaFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ana-chart-card{animation:anaFadeIn .3s ease both}
.ana-chart-card:nth-child(2){animation-delay:.05s}
.ana-chart-card:nth-child(3){animation-delay:.1s}
.ana-chart-card:nth-child(4){animation-delay:.15s}
.ana-chart-card:nth-child(5){animation-delay:.2s}
.ana-chart-card:nth-child(6){animation-delay:.25s}

/* Responsive analytics */
@media(max-width:1024px){
  .ana-charts-grid.cols-3{grid-template-columns:repeat(2,1fr)}
}

/* ── DarkLock FX Inline (admin) ── */
.dl-cursor-glow{position:fixed;width:320px;height:320px;border-radius:50%;pointer-events:none;z-index:0;opacity:0;transition:opacity .4s ease;background:radial-gradient(circle,rgba(99,102,241,.06) 0%,transparent 70%);transform:translate(-50%,-50%);will-change:left,top}
body:hover .dl-cursor-glow{opacity:1}
.dl-ripple-wave{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.25) 0%,transparent 70%);transform:scale(0);animation:dl-ripple-expand .6s ease-out forwards;pointer-events:none;z-index:5}
@keyframes dl-ripple-expand{to{transform:scale(4);opacity:0}}
.dl-toast-container{position:fixed;top:24px;right:24px;z-index:100000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.dl-toast{pointer-events:auto;display:flex;align-items:center;gap:12px;padding:14px 20px;background:rgba(14,16,21,.95);backdrop-filter:blur(20px);border:1px solid rgba(99,102,241,.2);border-radius:14px;color:#e8eaed;font-family:Inter,system-ui,sans-serif;font-size:.9rem;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.3);animation:dl-toast-in .4s cubic-bezier(.16,1,.3,1) forwards;max-width:400px;cursor:pointer}
.dl-toast:hover{transform:translateX(-4px)}
.dl-toast.dl-toast-out{animation:dl-toast-out .3s ease-in forwards}
.dl-toast-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.dl-toast-success .dl-toast-icon{background:rgba(16,185,129,.15);color:#10b981}
.dl-toast-error .dl-toast-icon{background:rgba(239,68,68,.15);color:#ef4444}
.dl-toast-info .dl-toast-icon{background:rgba(99,102,241,.15);color:#6366f1}
.dl-toast-progress{position:absolute;bottom:0;left:0;height:3px;border-radius:0 0 14px 14px;background:linear-gradient(90deg,#6366f1,#7c3aed);animation:dl-toast-shrink var(--dl-toast-duration,4s) linear forwards}
@keyframes dl-toast-in{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes dl-toast-out{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
@keyframes dl-toast-shrink{from{width:100%}to{width:0%}}
a,button,input,select,textarea,[class*="card"]{transition:all .25s cubic-bezier(.23,1,.32,1)}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(99,102,241,.15);border-radius:99px;border:2px solid transparent;background-clip:content-box}::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,.3);background-clip:content-box}
:focus-visible{outline:2px solid rgba(99,102,241,.5)!important;outline-offset:2px!important;border-radius:4px}
.main-content{animation:dl-page-in .5s cubic-bezier(.16,1,.3,1) both}
@keyframes dl-page-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
<script>
(function(){
  // Cursor glow
  if(!window.matchMedia('(hover:none)').matches&&!window.matchMedia('(prefers-reduced-motion:reduce)').matches){
    var g=document.createElement('div');g.className='dl-cursor-glow';document.addEventListener('DOMContentLoaded',function(){document.body.appendChild(g)});
    var mx=-500,my=-500,cx=-500,cy=-500;
    document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY},{passive:true});
    (function anim(){cx+=(mx-cx)*.08;cy+=(my-cy)*.08;g.style.left=cx+'px';g.style.top=cy+'px';requestAnimationFrame(anim)})();
  }
  // Ripple
  document.addEventListener('click',function(e){
    var t=e.target.closest('button,.btn,.nav-link,[role="button"]');if(!t)return;
    var r=t.getBoundingClientRect(),s=document.createElement('span');s.className='dl-ripple-wave';
    var sz=Math.max(r.width,r.height)*2;s.style.width=s.style.height=sz+'px';
    s.style.left=(e.clientX-r.left-sz/2)+'px';s.style.top=(e.clientY-r.top-sz/2)+'px';
    t.style.position=t.style.position||'relative';t.style.overflow='hidden';t.appendChild(s);
    s.addEventListener('animationend',function(){s.remove()});
  });
  // Toast system
  document.addEventListener('DOMContentLoaded',function(){
    var c=document.createElement('div');c.className='dl-toast-container';document.body.appendChild(c);
    window.dlToast=function(msg,type,dur){
      type=type||'info';dur=dur||4000;
      var icons={success:'✓',error:'✕',warning:'⚠',info:'ℹ'};
      var t=document.createElement('div');t.className='dl-toast dl-toast-'+type;
      t.style.setProperty('--dl-toast-duration',dur+'ms');
      t.innerHTML='<div class="dl-toast-icon">'+icons[type]+'</div><span>'+msg+'</span><div class="dl-toast-progress"></div>';
      t.addEventListener('click',function(){t.classList.add('dl-toast-out');setTimeout(function(){t.remove()},300)});
      c.appendChild(t);
      setTimeout(function(){if(t.parentNode){t.classList.add('dl-toast-out');setTimeout(function(){t.remove()},300)}},dur);
    };
  });
})();
</script>

<script>
/* ═══════════════════════════════════════════════════════════════════════════════
   DARKLOCK ADMIN v4 — SPA CLIENT
   All API calls go to /api/v4/admin/*
   ═══════════════════════════════════════════════════════════════════════════════ */

let currentTab = 'overview';
let shellData = null;

// ── SVG Icons (inline, no CDN) ─────────────────────────────────────────────────
const ICONS = {

  'shopping-bag': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 7h12l-1 13H7L6 7z"/><path d="M9 7a3 3 0 016 0"/></svg>',

  'lock': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>',
  'settings': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>',

// ── API helper (fixed) ───────────────────────────────────────────────────────────
function getCSRFToken() {
  const m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
  return m ? decodeURIComponent(m[1]) : '';
}

async function api(path, opts = {}) {
  const csrfToken = getCSRFToken();
  const res = await fetch(`${API}${path}`, {
    credentials: 'include',
    headers: {
      'Accept': 'application/json',
      ...(opts.body && { 'Content-Type': 'application/json' }),
      ...(csrfToken && { 'X-CSRF-Token': csrfToken }),
      ...opts.headers,
    },
    ...opts,
  });

  if (res.status === 401) {
    // Only navigate to /signin if this isn't the initial boot call
    // (boot handles its own failure — avoids infinite redirect loops)
    if (!window._booting) location.href = '/signin';
    return null;
  }

  if (res.status === 403) {
    throw new Error('Forbidden: auth, CSRF, or permissions issue');
  }

  // If we get HTML back instead of JSON, a redirect was followed (usually a /signin redirect).
  // Treat it as an auth failure.
  const contentType = res.headers.get('content-type') || '';
  if (!contentType.includes('application/json')) {
    if (!window._booting) location.href = '/signin';
    return null;
  }

  let data = null;

  if (contentType.includes('application/json')) {
    try {
      data = await res.json();
    } catch {
      data = null;
    }
  } else {
    try {
      data = await res.text();
    } catch {
      data = null;
    }
  }

  if (!res.ok) {
    throw new Error(
      (data && data.error) ||
      (typeof data === 'string' && data) ||
      `HTTP ${res.status}`
    );
  }

  return data;
}
// ── Utility ─────────────────────────────────────────────────────────────────────
function esc(str) { if (!str) return ''; const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
function fmtDateTime(d) { if (!d) return '—'; return new Date(d).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
function truncate(s, n = 80) { return s && s.length > n ? s.slice(0, n) + '…' : s || ''; }

// ── Toast ───────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span>${esc(msg)}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 4000);
}

// ── Modal ───────────────────────────────────────────────────────────────────────
function openModal(title, bodyHtml, footerHtml = '') {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = footerHtml;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

// ── Sidebar toggle ──────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  if (window.innerWidth <= 768) sb.classList.toggle('mobile-open');
  else sb.classList.toggle('collapsed');
}

// ── Boot ────────────────────────────────────────────────────────────────────────
async function boot() {
  window._booting = true;
  try {
    shellData = await api('/shell');
    window._booting = false;
    if (!shellData || !Array.isArray(shellData.tabs)) {
      // Auth failed — show sign-in prompt, do NOT navigate (causes infinite loop)
      document.getElementById('content').innerHTML =
        '<div class="empty-state"><h4>Session Expired</h4><p>Your session has expired. Please sign in again.</p><a href="/signin" class="btn btn-primary mt-2">Sign In</a></div>';
      return;
    }
    renderSidebar(shellData.tabs);
    document.getElementById('adminAvatar').textContent = (shellData.admin.name || '?')[0].toUpperCase();
    document.getElementById('adminName').textContent = shellData.admin.name;
    document.getElementById('roleBadge').textContent = shellData.admin.role;
    navigate('overview');
  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="empty-state"><h4>Authentication Failed</h4><p>${esc(err.message)}</p><a href="/signin" class="btn btn-primary mt-2">Sign In</a></div>`;
  }
}

function renderSidebar(tabs) {
  const nav = document.getElementById('navItems');
  nav.innerHTML = `<div class="nav-section-title sidebar-text">Navigation</div>` + 
    tabs.map(t => `<div class="nav-item${t.id === currentTab ? ' active' : ''}" data-tab="${t.id}" onclick="navigate('${t.id}')">
      ${ICONS[t.icon] || ''}<span class="sidebar-text">${esc(t.label)}</span>
    </div>`).join('');
}

function navigate(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  const titleMap = { overview:'Overview', tickets:'Tickets', announcements:'Announcements', accounts:'Accounts', roles:'Role & Access', 'app-updates':'App Updates', shop:'Shop', server:'Server', 'bug-reports':'Bug Reports', 'system-logs':'System Logs', themes:'Themes', maintenance:'Maintenance', settings:'Platform Settings', analytics:'Analytics' };
  document.getElementById('pageTitle').textContent = titleMap[tab] || tab;
  document.getElementById('content').innerHTML = '<div class="loading">Loading...</div>';
  const loaders = { overview: loadOverview, tickets: loadTickets, announcements: loadAnnouncements, accounts: loadAccounts, roles: loadRoles, 'app-updates': loadAppUpdates, shop: loadShop, server: loadServer, 'bug-reports': loadBugReports, 'system-logs': loadSystemLogs, themes: loadThemes, maintenance: loadMaintenance, settings: loadSettings, analytics: loadAnalytics };
  (loaders[tab] || (() => {}))();
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('mobile-open');
}

function showCreateAnnouncement() {
  openModal('New Announcement', `
    <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="mTitle" placeholder="What's new?"></div>
    <div class="form-group"><label class="form-label">Content</label><textarea class="form-textarea" id="mContent" rows="5" placeholder="Describe the update or announcement..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Version (auto if blank)</label><input class="form-input" id="mVersion" placeholder="e.g. 2.1.0"></div>
      <div class="form-group"><label class="form-label">Visibility</label><select class="form-select" id="mVisibility"><option value="public">Public</option><option value="premium">Premium Only</option></select></div>
    </div>
    <div class="form-toggle"><label class="toggle-switch"><input type="checkbox" id="mPinned"><span class="toggle-slider"></span></label><span style="font-size:.85rem">Pin this announcement</span></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="submitAnnouncement()">Publish</button>`);
}

async function submitAnnouncement() {
  try {
    const title = document.getElementById('mTitle').value.trim();
    const content = document.getElementById('mContent').value.trim();
    const version = document.getElementById('mVersion').value.trim() || undefined;
    const visibility = document.getElementById('mVisibility').value;
    const pinned = document.getElementById('mPinned').checked;
    if (!title || !content) return toast('Title and content required', 'error');
    await api('/announcements', { method: 'POST', body: JSON.stringify({ title, content, version, visibility, pinned }) });
    closeModal(); toast('Announcement published!', 'success'); loadAnnouncements();
  } catch (err) { toast(err.message, 'error'); }
}

async function showEditAnnouncement(id) {
  const d = await api('/announcements');
  const a = (d.announcements || []).find(x => x.id === id);
  if (!a) return toast('Not found', 'error');
  openModal('Edit Announcement', `
    <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="mTitle" value="${esc(a.title)}"></div>
    <div class="form-group"><label class="form-label">Content</label><textarea class="form-textarea" id="mContent" rows="5">${esc(a.content)}</textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Version</label><input class="form-input" id="mVersion" value="${esc(a.version || '')}"></div>
      <div class="form-group"><label class="form-label">Visibility</label><select class="form-select" id="mVisibility"><option value="public" ${a.visibility==='public'?'selected':''}>Public</option><option value="premium" ${a.visibility==='premium'?'selected':''}>Premium Only</option></select></div>
    </div>
    <div class="form-toggle"><label class="toggle-switch"><input type="checkbox" id="mPinned" ${a.pinned?'checked':''}><span class="toggle-slider"></span></label><span style="font-size:.85rem">Pin this announcement</span></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="updateAnnouncement('${id}')">Save Changes</button>`);
}

async function updateAnnouncement(id) {
  try {
    await api(`/announcements/${id}`, { method: 'PUT', body: JSON.stringify({
      title: document.getElementById('mTitle').value.trim(),
      content: document.getElementById('mContent').value.trim(),
      version: document.getElementById('mVersion').value.trim() || undefined,
      visibility: document.getElementById('mVisibility').value,
      pinned: document.getElementById('mPinned').checked,
    })});
    closeModal(); toast('Announcement updated', 'success'); loadAnnouncements();
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteAnnouncement(id) {
  if (!confirm('Delete this announcement?')) return;
  try { await api(`/announcements/${id}`, { method: 'DELETE' }); toast('Deleted', 'success'); loadAnnouncements(); }
  catch (err) { toast(err.message, 'error'); }
}

let accountsPage = 0, accountsFilter = '', accountsSearch = '';

  try {
    const d = await api(`/accounts?limit=20&offset=${accountsPage * 20}${accountsFilter ? `&filter=${accountsFilter}` : ''}${accountsSearch ? `&search=${encodeURIComponent(accountsSearch)}` : ''}`);
    const total = d.total || 0;
    const pages = Math.ceil(total / 20) || 1;
    document.getElementById('content').innerHTML = `
      <div class="filter-bar">
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

        ${['','premium','free','admin','banned'].map(f => `<button class="filter-chip${accountsFilter===f?' active':''}" onclick="accountsFilter='${f}';accountsPage=0;loadAccounts()">${f||'All'}</button>`).join('')}

          <tbody>${(d.accounts || []).length === 0 ? '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-muted)">No accounts found</td></tr>' :
            (d.accounts || []).map(a => `<tr>
              <td style="font-weight:600">${esc(a.username || a.display_name || '—')}</td>
              <td>${esc(a.email || '—')}</td>
              <td><span class="badge badge-${a.role === 'premium' || a.role === 'vip' ? 'yellow' : a.role === 'admin' || a.role === 'owner' ? 'accent' : 'muted'}">${esc(a.role || 'user')}</span></td>
              <td><span class="badge badge-${a.active !== 0 ? 'green' : 'red'}">${a.active !== 0 ? 'Active' : 'Banned'}</span></td>
              <td>${fmtDate(a.created_at)}</td>
              <td>${fmtDate(a.last_login)}</td>
              <td><button class="btn btn-secondary btn-sm" onclick="showAccountActions('${a.id}')">Actions</button></td>

    const a = d.account;

        <div style="margin-top:.5rem;display:flex;gap:.5rem">

          <span class="badge badge-${a.active !== 0 ? 'green' : 'red'}">${a.active !== 0 ? 'Active' : 'Banned'}</span>
        </div>
      </div>

        ${a.active !== 0 ? `<button class="btn btn-danger" onclick="accountAction('${userId}','ban')">Ban Account</button>` :

        ${d.devices.map(dev => `<div style="padding:.5rem;background:var(--bg-input);border-radius:var(--radius-sm);margin-bottom:.35rem;font-size:.8rem">${esc(dev.name || dev.deviceId)} <span class="badge badge-${dev.status==='active'?'green':'muted'}">${esc(dev.status)}</span></div>`).join('')}</div>` : ''}`;

async function accountAction(userId, action) {
  const destructive = ['ban', 'delete', 'reset-password'];
  if (destructive.includes(action)) {
    if (!confirm(`Are you sure you want to ${action.replace('-', ' ')} this account?`)) return;
  }
  try {
    const body = destructive.includes(action) ? JSON.stringify({ confirm: true }) : '{}';
    const isDelete = action === 'delete';
    const endpoint = isDelete ? `/accounts/${userId}` : `/accounts/${userId}/${action}`;
    const d = await api(endpoint, { method: isDelete ? 'DELETE' : 'POST', body });
    closeModal();
    toast(d.message || 'Action completed', 'success');
    if (d.temporaryPassword) {
      openModal('Temporary Password', `<p style="margin-bottom:1rem;color:var(--text-secondary)">Share this securely with the user:</p><div style="padding:.75rem;background:var(--bg-input);border-radius:var(--radius-sm);font-family:monospace;font-size:1rem;word-break:break-all;user-select:all">${esc(d.temporaryPassword)}</div>`,
        `<button class="btn btn-primary" onclick="closeModal()">Done</button>`);
    }
    loadAccounts();
  } catch (err) { toast(err.message, 'error'); }
}

async function createAdmin() {
  try {

    const password = document.getElementById('mPassword').value;

function fmtSize(bytes) {
  if (!bytes) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
}

async function submitUploadFiles() {
  const version = document.getElementById('mUploadVersion').value.trim();
  if (!version) return toast('Version is required', 'error');
  if (!/^\d+\.\d+\.\d+$/.test(version)) return toast('Version must be semantic (e.g. 2.1.0)', 'error');
  if (!window._uploadFiles || window._uploadFiles.length === 0) return toast('Select files to upload', 'error');

  const formData = new FormData();
  formData.append('version', version);
  window._uploadFiles.forEach(f => formData.append('files', f));

  document.getElementById('uploadProgress').style.display = 'block';
  document.getElementById('btnUpload').disabled = true;

  try {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/v4/admin/app-updates/upload');
    xhr.withCredentials = true;
    const csrf = getCSRFToken();
    if (csrf) xhr.setRequestHeader('X-CSRF-Token', csrf);

    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressText').textContent = `Uploading... ${pct}% (${fmtSize(e.loaded)} / ${fmtSize(e.total)})`;
      }
    };

    await new Promise((resolve, reject) => {
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          const resp = JSON.parse(xhr.responseText);
          if (resp.success) resolve(resp);
          else reject(new Error(resp.error || 'Upload failed'));
        } else {
          try { reject(new Error(JSON.parse(xhr.responseText).error)); }
          catch { reject(new Error(`Upload failed (${xhr.status})`)); }
        }
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.send(formData);
    });

    closeModal();
    toast(`${window._uploadFiles.length} file(s) uploaded for v${version}!`, 'success');
    loadAppUpdates();
  } catch (err) {
    toast(err.message, 'error');
    document.getElementById('btnUpload').disabled = false;
    document.getElementById('uploadProgress').style.display = 'none';
  }
}

function fmtMoney(cents, currency = 'usd') {
  try {
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: String(currency || 'usd').toUpperCase() }).format((Number(cents) || 0) / 100);

    return `$${((Number(cents) || 0) / 100).toFixed(2)}`;

}

async function submitCreateShopItem() {
  try {
    const title = document.getElementById('mShopTitle').value.trim();
    const badge = document.getElementById('mShopBadge').value.trim();
    const slug = document.getElementById('mShopSlug').value.trim();
    const subtitle = document.getElementById('mShopSubtitle').value.trim();
    const description = document.getElementById('mShopDesc').value.trim();
    const sort_order = Number(document.getElementById('mShopSort').value || 0);
    const billing_type = document.getElementById('mShopBilling').value;
    const currency = document.getElementById('mShopCurrency').value.trim().toLowerCase() || 'usd';
    const stripe_price_id = document.getElementById('mShopStripePrice').value.trim();
    const image_url = document.getElementById('mShopImage').value.trim();
    const published = document.getElementById('mShopPublish').checked;
    const priceInput = Number(document.getElementById('mShopPrice').value || 0);
    const price_cents = Math.round(priceInput * 100);
    const features = parseFeatureLines(document.getElementById('mShopFeatures').value);

    if (!title) return toast('Title is required', 'error');
    if (!Number.isInteger(price_cents) || price_cents < 50) return toast('Price must be at least $0.50', 'error');

    await api('/shop/items', {
      method: 'POST',
      body: JSON.stringify({
        app: 'ridgeline',
        title,
        badge: badge || undefined,
        slug: slug || undefined,
        subtitle: subtitle || undefined,
        description: description || undefined,
        image_url: image_url || undefined,
        price_cents,
        currency,
        billing_type,
        stripe_price_id: stripe_price_id || undefined,
        features,
        sort_order,
        published,
      }),
    });

    closeModal();
    toast('Shop item created', 'success');
    loadShop();
  } catch (err) {
    toast(err.message, 'error');
  }
}

function _serverFmtPctColor(p) {
  if (p > 85) return 'var(--red)';
  if (p > 70) return 'var(--yellow)';
  return 'var(--green)';
}

async function loadServer() {
  try {
    const [statusRes, svcRes, securityRes] = await Promise.all([
      api('/server/status'),
      api('/server/services'),
      api('/security').catch(() => null),
    ]);
    const s = statusRes.server || {};
    const services = svcRes.services || [];
    const sec = securityRes || null;
    const mem = s.memory || {};
    const disk = s.disk;
    const load = s.loadAvg || {};

    const memPct  = mem.pct || 0;
    const diskPct = disk ? (disk.pct || 0) : 0;
    const cpuLoad = ((load['1m'] || 0) / Math.max(s.cpus || 1, 1)) * 100;

    document.getElementById('content').innerHTML = `
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:1.5rem">
        <div class="stat-card">
          <div class="stat-label">Hostname</div>
          <div class="stat-value" style="font-size:1rem;font-family:monospace">${esc(s.hostname || '–')}</div>
          <div style="font-size:.7rem;color:var(--text-muted);margin-top:.25rem">${esc(s.platform || '')} · ${esc(s.arch || '')}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">System Uptime</div>
          <div class="stat-value" style="font-size:1.05rem">${esc(s.uptime || '–')}</div>
          <div style="font-size:.7rem;color:var(--text-muted);margin-top:.25rem">Admin proc: ${esc(s.processUptime || '–')}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">CPU Load (1m / 5m / 15m)</div>
          <div class="stat-value" style="font-size:1rem;color:${_serverFmtPctColor(cpuLoad)}">
            ${(load['1m']||0).toFixed(2)} / ${(load['5m']||0).toFixed(2)} / ${(load['15m']||0).toFixed(2)}
          </div>
          <div style="font-size:.7rem;color:var(--text-muted);margin-top:.25rem">${esc(String(s.cpus || '?'))} cores · ~${Math.round(cpuLoad)}% on 1m</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Memory</div>
          <div class="stat-value" style="font-size:1.05rem;color:${_serverFmtPctColor(memPct)}">${esc(mem.usedHuman || '–')} / ${esc(mem.totalHuman || '–')}</div>
          <div style="font-size:.7rem;color:var(--text-muted);margin-top:.25rem">${memPct}% used</div>
        </div>
        ${disk ? `
        <div class="stat-card">
          <div class="stat-label">Disk (/)</div>
          <div class="stat-value" style="font-size:1.05rem;color:${_serverFmtPctColor(diskPct)}">${esc(disk.usedHuman || '–')} / ${esc(disk.totalHuman || '–')}</div>
          <div style="font-size:.7rem;color:var(--text-muted);margin-top:.25rem">${diskPct}% used</div>
        </div>` : ''}
        <div class="stat-card">
          <div class="stat-label">Node Runtime</div>
          <div class="stat-value" style="font-size:1rem;font-family:monospace">${esc(s.node || '?')}</div>
        </div>
      </div>

      <div style="display:flex;gap:.5rem;margin-bottom:1rem;align-items:center;flex-wrap:wrap">
        <h3 style="font-size:.95rem;font-weight:600;margin:0">Darklock Services</h3>
        <span style="font-size:.75rem;color:var(--text-muted)">read-only · ${services.length} units</span>
        <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="loadServer()">Refresh</button>
      </div>

      <div class="card">
        <div class="table-wrap"><table>
          <thead><tr><th>Service</th><th>Status</th><th>Sub-state</th><th>Main PID</th><th>Started</th></tr></thead>
          <tbody>${services.map(svc => {
            const isActive = svc.active === 'active';
            const isFailed = svc.active === 'failed' || svc.state === 'failed';
            const badge = isActive ? 'green' : isFailed ? 'red' : 'muted';
            return `<tr>
              <td>
                <div style="font-weight:600">${esc(svc.name)}</div>
                <div style="font-size:.7rem;color:var(--text-muted)">${esc(svc.description)}</div>
              </td>
              <td><span class="badge badge-${badge}">${esc(svc.active)}</span></td>
              <td style="font-size:.78rem;color:var(--text-secondary)">${esc(svc.sub || '–')}</td>
              <td style="font-family:monospace;font-size:.78rem">${esc(svc.mainPid || '–')}</td>
              <td style="font-size:.72rem;color:var(--text-muted)">${esc(svc.activeSince || '–')}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>

      ${_renderServerSecurityControls(sec)}

      <div class="card mt-2">
        <div class="card-body" style="font-size:.78rem;color:var(--text-muted);line-height:1.6">
          <strong style="color:var(--text-secondary)">Security note:</strong>
          This tab reports on the local server (192.168.50.173) using <code>os.*</code> and bounded <code>systemctl is-active / show</code> + <code>df</code> calls with hardcoded arguments. No SSH, no remote execution, no user-controlled command input. Service restart actions are intentionally not exposed here — perform them from the server console where they are properly auditable and elevation-gated.
        </div>
      </div>
    `;
  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="empty-state"><h4>Failed to load server status</h4><p>${esc(err.message)}</p></div>`;
  }
}

        ` : ''}
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem">

let bugsPage = 0, bugsSource = '', bugsStatus = '', bugsSeverity = '';
async function loadBugReports() {
  try {
    const params = new URLSearchParams({ limit: '20', offset: String(bugsPage * 20) });
    if (bugsSource) params.set('source', bugsSource);
    if (bugsStatus) params.set('status', bugsStatus);
    if (bugsSeverity) params.set('severity', bugsSeverity);
    const d = await api(`/bug-reports?${params}`);
    const total = d.total || 0;
    const pages = Math.ceil(total / 20) || 1;

    document.getElementById('content').innerHTML = `
      <div class="filter-bar">
        <span style="font-size:.75rem;color:var(--text-muted);font-weight:600">SOURCE:</span>
        ${['','site','app'].map(f => `<button class="filter-chip${bugsSource===f?' active':''}" onclick="bugsSource='${f}';bugsPage=0;loadBugReports()">${f||'All'}</button>`).join('')}
        <span style="font-size:.75rem;color:var(--text-muted);font-weight:600;margin-left:.5rem">STATUS:</span>
        ${['','open','reviewing','resolved'].map(s => `<button class="filter-chip${bugsStatus===s?' active':''}" onclick="bugsStatus='${s}';bugsPage=0;loadBugReports()">${s||'All'}</button>`).join('')}
        <span style="font-size:.75rem;color:var(--text-muted);font-weight:600;margin-left:.5rem">SEVERITY:</span>
        ${['','low','medium','high','critical'].map(s => `<button class="filter-chip${bugsSeverity===s?' active':''}" onclick="bugsSeverity='${s}';bugsPage=0;loadBugReports()">${s||'All'}</button>`).join('')}
        <button class="btn btn-secondary btn-sm" onclick="loadBugReports()" style="margin-left:auto" title="Refresh bug reports">🔄 Refresh</button>
      </div>
      <div class="card">
        <div class="table-wrap"><table>
          <thead><tr><th>#</th><th>Title</th><th>Source</th><th>Severity</th><th>Status</th><th>Reporter</th><th>Date</th><th></th></tr></thead>
          <tbody>${(d.reports || []).length === 0 ? '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-muted)">No bug reports found</td></tr>' :
            (d.reports || []).map(r => `<tr>
              <td style="color:var(--text-muted)">#${r.id}</td>
              <td style="font-weight:600;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.title)}</td>
              <td><span class="badge badge-${r.source === 'app' ? 'accent' : 'blue'}">${esc(r.source)}</span></td>
              <td><span class="badge badge-${r.severity === 'critical' ? 'red' : r.severity === 'high' ? 'yellow' : r.severity === 'low' ? 'muted' : 'blue'}">${esc(r.severity)}</span></td>
              <td><span class="badge badge-${r.status === 'resolved' ? 'green' : r.status === 'reviewing' ? 'yellow' : 'red'}">${esc(r.status)}</span></td>
              <td>${esc(r.reporter || r.email || '—')}</td>
              <td>${fmtDate(r.created_at)}</td>
              <td><button class="btn btn-secondary btn-sm" onclick="viewBugReport(${r.id})">View</button></td>
            </tr>`).join('')}</tbody>
        </table></div>
        <div class="pagination">
          <div class="pagination-info">${total} total • Page ${bugsPage + 1} of ${pages}</div>
          <div class="pagination-buttons">
            <button ${bugsPage===0?'disabled':''} onclick="bugsPage--;loadBugReports()">‹</button>
            <button ${bugsPage>=pages-1?'disabled':''} onclick="bugsPage++;loadBugReports()">›</button>
          </div>
        </div>
      </div>`;
  } catch (err) { toast(err.message, 'error'); }
}

async function viewBugReport(id) {
  try {
    const d = await api(`/bug-reports/${id}`);
    const r = d.report;
    openModal(`Bug Report #${r.id}`, `
      <div style="margin-bottom:1rem">
        <h4 style="margin-bottom:.5rem">${esc(r.title)}</h4>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem">
          <span class="badge badge-${r.source === 'app' ? 'accent' : 'blue'}">${esc(r.source)}</span>
          <span class="badge badge-${r.severity === 'critical' ? 'red' : r.severity === 'high' ? 'yellow' : 'blue'}">${esc(r.severity)}</span>
          <span class="badge badge-${r.status === 'resolved' ? 'green' : r.status === 'reviewing' ? 'yellow' : 'red'}">${esc(r.status)}</span>
          ${r.app_version ? `<span class="badge badge-muted">v${esc(r.app_version)}</span>` : ''}
        </div>

async function deleteBugReport(id) {

async function activateLockdown(level) {
  const warnings = {
    soft:   'Enable maintenance mode? Users will see a maintenance page.',
    medium: 'Medium lockdown will stop the Discord bot and terminate all user sessions. Continue?',
    hard:   '⚠ HARD LOCKDOWN will stop ALL services (bot, hardware bridges, guard). The admin panel will remain up for remote release. Continue?',
  };
  if (!confirm(warnings[level])) return;
  try {
    const r = await api('/security/lockdown', { method: 'POST', body: JSON.stringify({ level }) });
    toast(r.message, 'success');
    refreshSecurityContext();
  } catch (err) { toast(err.message, 'error'); }
}

async function releaseLockdown() {
  if (!confirm('Release lockdown and restore all services?')) return;
  try {
    const r = await api('/security/lockdown/release', { method: 'POST' });
    toast(r.message, 'success');
    refreshSecurityContext();
  } catch (err) { toast(err.message, 'error'); }
}

function refreshSecurityContext() {
  if (currentTab === 'server') loadServer();
  else loadSecurity();
}

async function toggleSecurityMaintenance(enabled) {
  try { await api('/security/maintenance', { method: 'POST', body: JSON.stringify({ enabled }) }); toast(enabled ? 'Maintenance enabled' : 'Maintenance disabled', 'success'); }
  catch (err) { toast(err.message, 'error'); refreshSecurityContext(); }
}

async function updateMaintenanceMsg() {

}

async function toggleRegistration(enabled) {

async function toggleScopedMaintenance(scope, enabled) {
  try {
    await api('/maintenance/update', { method: 'POST', body: JSON.stringify({ scope, enabled }) });
    toast(enabled ? `${scope} maintenance enabled` : `${scope} maintenance disabled`, enabled ? 'warning' : 'success');
    loadMaintenance();
  } catch (err) { toast(err.message, 'error'); }
}

async function saveMaintenance(scope) {
  try {
    const title = document.getElementById(`mt_title_${scope}`)?.value;
    const subtitle = document.getElementById(`mt_subtitle_${scope}`)?.value;
    const message = document.getElementById(`mt_msg_${scope}`)?.value;
    const scheduledEnd = document.getElementById(`mt_end_${scope}`)?.value || null;
    const adminBypass = document.getElementById(`mt_admin_${scope}`)?.checked;
    const applyLocalhost = document.getElementById(`mt_localhost_${scope}`)?.checked;
    const ipsRaw = document.getElementById(`mt_ips_${scope}`)?.value || '';
    const bypassIps = ipsRaw.split(',').map(s => s.trim()).filter(Boolean);

    await api('/maintenance/update', { method: 'POST', body: JSON.stringify({ scope, title, subtitle, message, scheduledEnd, adminBypass, applyLocalhost, bypassIps }) });
    toast(`${scope} settings saved`, 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function toggleAllMaintenance(enabled) {
  if (!confirm(enabled ? 'Enable maintenance for ALL services? Users will see maintenance pages.' : 'Disable ALL maintenance? Services will go live.')) return;
  try {
    await api('/maintenance/toggle-all', { method: 'POST', body: JSON.stringify({ enabled }) });
    toast(enabled ? 'All maintenance enabled' : 'All maintenance disabled', enabled ? 'warning' : 'success');
    loadMaintenance();
  } catch (err) { toast(err.message, 'error'); }
}

async function loadSettings() {
  try {
    const d = await api('/settings');
    const cfg = d.config || {};
    const entries = Object.entries(cfg);

    // Group settings into sensible categories. Unknown keys fall through to 'Other'.
    const groups = {
      'General': ['platform_name', 'contact_email'],
      'Authentication': ['registration_enabled', 'email_verification'],
      'Maintenance': ['maintenance_mode', 'maintenance_message'],
      'Tier Limits': ['free_tier_file_limit', 'premium_tier_file_limit'],
      'App Distribution': ['current_app_version'],
    };
    const known = new Set(Object.values(groups).flat());
    const otherKeys = entries.map(([k]) => k).filter(k => !known.has(k));
    if (otherKeys.length) groups['Other'] = otherKeys;

    const renderRow = (key, item) => `
      <div style="display:flex;align-items:center;gap:1rem;padding:.75rem 0;border-bottom:1px solid var(--border)">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:.85rem">${esc(key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()))}</div>
          <div style="font-size:.72rem;color:var(--text-muted)">${esc(item.description || '')}${item.updated_by ? ` · last updated by ${esc(item.updated_by)}` : ''} · <code style="font-size:.65rem;background:var(--bg-input);padding:1px 5px;border-radius:3px">${esc(key)}</code></div>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem;flex-shrink:0">
          ${item.type === 'boolean' ? `
            <label class="toggle-switch"><input type="checkbox" ${item.value === 'true' ? 'checked' : ''} onchange="saveSetting('${esc(key)}', this.checked ? 'true' : 'false')"><span class="toggle-slider"></span></label>
          ` : `
            <input class="form-input" id="cfg_${esc(key)}" value="${esc(item.value || '')}" style="width:220px;font-size:.8rem">
            <button class="btn btn-secondary btn-sm" onclick="saveSetting('${esc(key)}', document.getElementById('cfg_${esc(key)}').value)">Save</button>
          `}
        </div>
      </div>`;

    const sections = Object.entries(groups).map(([groupName, keyList]) => {
      const rows = keyList.filter(k => cfg[k]).map(k => renderRow(k, cfg[k])).join('');
      if (!rows) return '';
      return `
        <div class="card" style="margin-bottom:1rem">
          <div class="card-header"><h3>${esc(groupName)}</h3></div>
          <div class="card-body">${rows}</div>
        </div>`;
    }).join('');

    document.getElementById('content').innerHTML = `
      <div style="margin-bottom:1rem;font-size:.78rem;color:var(--text-muted)">${entries.length} configuration key${entries.length === 1 ? '' : 's'} · changes are audit-logged and take effect immediately for code paths that read this key.</div>
      ${sections || '<div class="empty-state"><p>No platform settings defined.</p></div>'}`;
  } catch (err) { toast(err.message, 'error'); }
}

async function saveSetting(key, value) {
  try { await api(`/settings/${key}`, { method: 'PUT', body: JSON.stringify({ value }) }); toast(`${key} updated`, 'success'); }
  catch (err) { toast(err.message, 'error'); }
}

/* ── Chart.js CDN loader ─────────────────────────────────────────────────────── */
function ensureChartJs() {
  return new Promise((resolve, reject) => {
    if (_chartJsLoaded && window.Chart) return resolve();
    if (document.getElementById('chartjs-cdn')) {
      // Already loading, wait for it
      const check = setInterval(() => { if (window.Chart) { clearInterval(check); _chartJsLoaded = true; resolve(); } }, 50);
      setTimeout(() => { clearInterval(check); reject(new Error('Chart.js load timeout')); }, 10000);
      return;
    }
    const s = document.createElement('script');
    s.id = 'chartjs-cdn';
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js';
    s.onload = () => { _chartJsLoaded = true; resolve(); };
    s.onerror = () => reject(new Error('Failed to load Chart.js'));
    document.head.appendChild(s);
  });
}

/* ── Health card builder ───────────────────────────────────────────────────── */
function anaHealthCard(icon, label, value, color, trend, dir, barPct) {
  const colors = { accent: 'var(--accent)', green: 'var(--green)', red: 'var(--red)', yellow: 'var(--yellow)', blue: 'var(--blue)' };
  const bgColors = { accent: 'var(--accent-dim)', green: 'var(--green-dim)', red: 'var(--red-dim)', yellow: 'var(--yellow-dim)', blue: 'var(--blue-dim)' };
  return `<div class="ana-health-card">
    <div class="health-icon" style="background:${bgColors[color] || bgColors.accent}">${icon}</div>
    <div class="health-label">${esc(label)}</div>
    <div class="health-value" style="color:${colors[color] || colors.accent}">${value ?? 0}</div>
    <div class="health-trend ${dir}">${dir === 'up' ? '↑' : dir === 'down' ? '↓' : '—'} ${esc(trend)}</div>
    <div class="health-bar"><div class="health-bar-fill" style="width:${Math.min(barPct || 0, 100)}%;background:${colors[color] || colors.accent}"></div></div>
  </div>`;
}

/* ── Chart renderer ─────────────────────────────────────────────────────── */
function renderAnaChart(slotId, metric, type, data, palette) {
  const canvasId = `canvas-${slotId}`;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (_anaCharts[slotId]) { _anaCharts[slotId].destroy(); delete _anaCharts[slotId]; }

  const pal = ANA_PALETTES[palette || 'indigo'];
  const labels = data.labels || [];
  const values = data.values || [];

  let config;
  switch (type) {
    case 'bar':
      config = { type: 'bar', data: { labels, datasets: [{ label: ANA_METRIC_LABELS[metric] || metric, data: values, backgroundColor: pal.map(c => c + '99'), borderColor: pal[0], borderWidth: 1, borderRadius: 6, maxBarThickness: 40 }] }, options: anaChartOpts(type) };
      break;
    case 'line':
      config = { type: 'line', data: { labels, datasets: [{ label: ANA_METRIC_LABELS[metric] || metric, data: values, borderColor: pal[0], backgroundColor: 'transparent', tension: .4, pointRadius: 3, pointBackgroundColor: pal[0], borderWidth: 2 }] }, options: anaChartOpts(type) };
      break;
    case 'area':
      config = { type: 'line', data: { labels, datasets: [{ label: ANA_METRIC_LABELS[metric] || metric, data: values, borderColor: pal[0], backgroundColor: hexToRGBA(pal[0], .15), fill: true, tension: .4, pointRadius: 2, borderWidth: 2 }] }, options: anaChartOpts(type) };
      break;
    case 'donut':
      config = { type: 'doughnut', data: { labels, datasets: [{ data: values, backgroundColor: pal, borderColor: '#12141b', borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'right', labels: { padding: 12, font: { size: 11 } } } } } };
      break;
    case 'pie':
      config = { type: 'pie', data: { labels, datasets: [{ data: values, backgroundColor: pal, borderColor: '#12141b', borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { padding: 12, font: { size: 11 } } } } } };
      break;
    case 'stacked_bar':
      config = { type: 'bar', data: { labels, datasets: splitIntoGroups(values, labels).map((g, i) => ({ label: g.label, data: g.data, backgroundColor: pal[i % pal.length] + 'bb', borderRadius: 3 })) }, options: { ...anaChartOpts('bar'), scales: { x: { stacked: true, ...anaScaleOpts() }, y: { stacked: true, ...anaScaleOpts() } } } };
      break;
    case 'multi_line':
      config = { type: 'line', data: { labels, datasets: splitIntoGroups(values, labels).map((g, i) => ({ label: g.label, data: g.data, borderColor: pal[i % pal.length], tension: .4, pointRadius: 2, borderWidth: 2, backgroundColor: 'transparent' })) }, options: anaChartOpts('line') };
      break;
    case 'heatmap': {
      // Simulate heatmap with bar chart color-mapped
      const max = Math.max(...values, 1);
      config = { type: 'bar', data: { labels, datasets: [{ label: ANA_METRIC_LABELS[metric] || metric, data: values, backgroundColor: values.map(v => heatmapColor(v / max)), borderRadius: 3, maxBarThickness: 40 }] }, options: anaChartOpts('bar') };
      break;
    }
    case 'radar':
      config = { type: 'radar', data: { labels: labels.slice(0, 8), datasets: [{ label: ANA_METRIC_LABELS[metric] || metric, data: values.slice(0, 8), borderColor: pal[0], backgroundColor: hexToRGBA(pal[0], .2), pointBackgroundColor: pal[0], borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { r: { grid: { color: '#1f2233' }, angleLines: { color: '#1f2233' }, ticks: { display: false }, pointLabels: { font: { size: 10 } } } }, plugins: { legend: { display: false } } } };
      break;
    default:
      config = { type: 'bar', data: { labels, datasets: [{ data: values, backgroundColor: pal[0] + '99', borderColor: pal[0], borderWidth: 1, borderRadius: 6 }] }, options: anaChartOpts('bar') };
  }

  _anaCharts[slotId] = new Chart(canvas.getContext('2d'), config);
}

function anaChartOpts(type) {
  return {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1d28', titleColor: '#e8eaed', bodyColor: '#9ca0b0',
        borderColor: '#2a2e44', borderWidth: 1, cornerRadius: 8, padding: 10,
        titleFont: { weight: '600' },
      },
    },
    scales: {
      x: anaScaleOpts(),
      y: { ...anaScaleOpts(), beginAtZero: true },
    },
    animation: { duration: 600, easing: 'easeOutQuart' },
  };
}

function anaScaleOpts() {
  return { grid: { color: '#1a1d2833' }, ticks: { font: { size: 10 }, maxTicksLimit: 10 }, border: { display: false } };
}

/* ── Combined chart (joins vs leaves) ───────────────────────────────────── */
function renderCombinedChart(canvasId, joinsData, leavesData) {
  const canvas = document.getElementById(canvasId);

  new Chart(canvas.getContext('2d'), {

        { label: 'Leaves', data: leavesData.values, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,.1)', fill: true, tension: .4, pointRadius: 2, borderWidth: 2 },
      ],

/* ── Risk gauge (arc canvas) ──────────────────────────────────────────── */
function renderRiskGauge(score) {
  const canvas = document.getElementById('riskGaugeCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h - 10, r = Math.min(cx, cy) - 10;
  ctx.clearRect(0, 0, w, h);

  // Background arc
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI, 0); ctx.lineWidth = 14;
  ctx.strokeStyle = '#1f2233'; ctx.lineCap = 'round'; ctx.stroke();

  // Score arc
  const pct = Math.min(score, 100) / 100;
  const gradient = ctx.createLinearGradient(0, 0, w, 0);
  gradient.addColorStop(0, '#22c55e'); gradient.addColorStop(.5, '#f59e0b'); gradient.addColorStop(1, '#ef4444');
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI, Math.PI + Math.PI * pct);
  ctx.lineWidth = 14; ctx.strokeStyle = gradient; ctx.lineCap = 'round'; ctx.stroke();

  // Needle
  const angle = Math.PI + Math.PI * pct;
  const nx = cx + (r - 5) * Math.cos(angle);
  const ny = cy + (r - 5) * Math.sin(angle);
  ctx.beginPath(); ctx.arc(nx, ny, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
}

/* ── Helpers ─────────────────────────────────────────────────────────────── */
function hexToRGBA(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function heatmapColor(t) {
  // 0=cool blue → 1=hot red
  if (t < .33) return `rgba(59,130,246,${.3 + t})`;
  if (t < .66) return `rgba(245,158,11,${.3 + t})`;
  return `rgba(239,68,68,${.3 + t})`;
}
function splitIntoGroups(values, labels) {
  // For stacked/multi-line: split single series into 3 synthetic groups
  const third = Math.ceil(values.length / 3);
  return [
    { label: 'Group A', data: values.map((v, i) => i < third ? v : Math.floor(v * .6)) },
    { label: 'Group B', data: values.map((v, i) => i >= third && i < third * 2 ? v : Math.floor(v * .3)) },
    { label: 'Group C', data: values.map((v, i) => i >= third * 2 ? v : Math.floor(v * .1)) },
  ];
}

/* ── Drag and Drop ──────────────────────────────────────────────────── */
let _anaDragEl = null;
function initAnaDragDrop() {
  const grid = document.getElementById('anaChartsGrid');
  if (!grid) return;
  const cards = grid.querySelectorAll('.ana-chart-card[draggable="true"]');
  cards.forEach(card => {
    card.addEventListener('dragstart', e => {
      _anaDragEl = card;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.ana-chart-card.drag-over').forEach(c => c.classList.remove('drag-over'));
      _anaDragEl = null;
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (card !== _anaDragEl) card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      if (_anaDragEl && _anaDragEl !== card) {
        const parent = card.parentNode;
        const allCards = [...parent.children];
        const fromIdx = allCards.indexOf(_anaDragEl);
        const toIdx = allCards.indexOf(card);
        if (fromIdx < toIdx) parent.insertBefore(_anaDragEl, card.nextSibling);
        else parent.insertBefore(_anaDragEl, card);
        toast('Chart position updated', 'info');
      }
    });
  });
}
