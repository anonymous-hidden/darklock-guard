<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Darklock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/platform/static/icons/darklock-guard.png" sizes="256x256">
    <style>
        :root {
            --bg: #07070e;
            --surface: rgba(255,255,255,0.04);
            --surface-border: rgba(255,255,255,0.07);
            --surface-hover: rgba(255,255,255,0.06);
            --text: #f1f3f7;
            --text-dim: #9196a8;
            --text-muted: #5d6178;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99,102,241,0.3);
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            overflow: hidden;
        }

        .bg-scene { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.3; animation: drift 30s ease-in-out infinite; }
        .bg-orb-1 { width: 600px; height: 600px; background: #6366f1; top: -25%; right: -10%; }
        .bg-orb-2 { width: 450px; height: 450px; background: #8b5cf6; bottom: -20%; left: -10%; animation-delay: -12s; }
        .bg-orb-3 { width: 300px; height: 300px; background: #06b6d4; top: 40%; left: 50%; transform: translateX(-50%); animation-delay: -6s; opacity: 0.15; }
        @keyframes drift { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20px,-15px) scale(1.05); } }

        .bg-noise {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .back-link {
            position: fixed; top: 1.5rem; left: 1.75rem; z-index: 10;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--text-dim); font-size: 0.88rem; font-weight: 500;
            text-decoration: none; padding: 0.5rem 0.85rem;
            border-radius: 10px; border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .back-link:hover { color: var(--text); background: var(--surface); border-color: var(--surface-border); }
        .back-link svg { width: 16px; height: 16px; }

        .wrapper {
            position: relative; z-index: 2;
            width: 100%; max-width: 420px;
            padding: 1.5rem;
            animation: fadeUp 0.5s ease-out;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .logo {
            display: flex; align-items: center; justify-content: center;
            gap: 0.55rem; margin-bottom: 2.25rem;
            text-decoration: none; color: var(--text);
        }
        .logo img { width: 38px; height: 38px; border-radius: 10px; }
        .logo span { font-weight: 700; font-size: 1.35rem; letter-spacing: -0.01em; }

        .card {
            background: linear-gradient(145deg, rgba(15,15,25,0.85), rgba(10,10,18,0.9));
            border: 1px solid var(--surface-border);
            backdrop-filter: blur(24px) saturate(1.4);
            border-radius: 20px;
            padding: 2.75rem 2.5rem 2.25rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(99,102,241,0.04);
        }

        h1 { font-size: 1.65rem; font-weight: 700; text-align: center; margin-bottom: 0.35rem; letter-spacing: -0.02em; }
        .subtitle { text-align: center; color: var(--text-dim); font-size: 0.92rem; margin-bottom: 2rem; }
        .subtitle a { color: var(--accent-light); text-decoration: none; font-weight: 500; }
        .subtitle a:hover { text-decoration: underline; }

        .alert { padding: 0.75rem 1rem; border-radius: 12px; font-size: 0.86rem; margin-bottom: 1.25rem; display: none; align-items: center; gap: 0.5rem; animation: fadeUp 0.3s ease; }
        .alert.error { display: flex; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
        .alert.success { display: flex; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }

        .field { margin-bottom: 1.1rem; }
        .field label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--text-dim); margin-bottom: 0.5rem; }
        .field input {
            width: 100%; padding: 0.78rem 1rem;
            background: var(--surface); border: 1px solid var(--surface-border);
            border-radius: 12px; color: var(--text);
            font-size: 0.95rem; font-family: var(--font);
            transition: all 0.2s ease; outline: none;
        }
        .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .field input::placeholder { color: var(--text-muted); }

        .pass-wrap { position: relative; }
        .pass-toggle {
            position: absolute; right: 0.85rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; transition: color 0.2s;
        }
        .pass-toggle:hover { color: var(--text-dim); }
        .pass-toggle svg { width: 18px; height: 18px; }
        .pass-toggle .icon-hide { display: none; }
        .pass-toggle.active .icon-show { display: none; }
        .pass-toggle.active .icon-hide { display: block; }

        .strength-bar { margin-top: 0.5rem; height: 3px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; border-radius: 3px; transition: all 0.3s ease; }
        .strength-label { font-size: 0.75rem; margin-top: 0.35rem; color: var(--text-muted); }

        .checkbox-row { display: flex; align-items: flex-start; gap: 0.6rem; margin-bottom: 1.3rem; }
        .checkbox-row input[type="checkbox"] {
            accent-color: var(--accent); width: 16px; height: 16px; margin-top: 2px; cursor: pointer; flex-shrink: 0;
        }
        .checkbox-row label { font-size: 0.84rem; color: var(--text-dim); cursor: pointer; line-height: 1.5; }
        .checkbox-row label a { color: var(--accent-light); text-decoration: none; }
        .checkbox-row label a:hover { text-decoration: underline; }

        .hidden { display: none !important; }

        .btn-submit {
            width: 100%; padding: 0.82rem 1.5rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: #fff; border: none; border-radius: 12px;
            font-family: var(--font); font-size: 0.96rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            transition: all 0.2s ease; box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 32px var(--accent-glow); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-loader { display: flex; }
        .spinner { width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
        .spinner circle { stroke-dasharray: 40; stroke-dashoffset: 30; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.8rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--surface-border); }

        .oauth-group { display: flex; flex-direction: column; gap: 0.6rem; }
        .btn-oauth {
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.6rem;
            padding: 0.72rem 1rem; background: var(--surface); border: 1px solid var(--surface-border);
            border-radius: 12px; color: var(--text); font-family: var(--font); font-size: 0.92rem; font-weight: 500;
            cursor: pointer; text-decoration: none; transition: all 0.2s ease;
        }
        .btn-oauth:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.12); transform: translateY(-1px); }
        .btn-oauth:active { transform: translateY(0); }
        .btn-oauth svg { width: 20px; height: 20px; flex-shrink: 0; }

        .terms-footer { text-align: center; margin-top: 1.75rem; font-size: 0.8rem; color: var(--text-muted); line-height: 1.6; }
        .terms-footer a { color: var(--text-dim); text-decoration: none; }
        .terms-footer a:hover { color: var(--text); text-decoration: underline; }

        @media (max-width: 480px) {
            .wrapper { padding: 1rem; }
            .card { padding: 2rem 1.5rem 1.75rem; border-radius: 16px; }
            h1 { font-size: 1.4rem; }
            .back-link { top: 1rem; left: 1rem; font-size: 0.82rem; }
        }
    </style>
</head>
<body>
    <div class="bg-scene">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>
    <div class="bg-noise"></div>

    <a href="/platform" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5m0 0l7-7m-7 7l7 7"/></svg>
        Back to Darklock
    </a>

    <div class="wrapper">
        <a href="/platform" class="logo">
            <img src="/platform/static/icons/darklock-logo.png" alt="Darklock" onerror="this.style.display='none'">
            <span>Darklock</span>
        </a>

        <div class="card">
            <h1>Create your account</h1>
            <p class="subtitle">Already have an account? <a href="/platform/auth/login">Sign in.</a></p>

            <div class="alert" id="alert"></div>

            <form id="signupForm" autocomplete="on">
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="coolname123" required autocomplete="username">
                </div>

                <div class="field">
                    <label for="email">E-mail address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <div class="pass-wrap">
                        <input type="password" id="password" name="password" placeholder="At least 8 characters" required autocomplete="new-password">
                        <button type="button" class="pass-toggle" aria-label="Toggle password visibility">
                            <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <p class="strength-label" id="strengthLabel"></p>
                </div>

                <div class="field">
                    <label for="confirmPassword">Confirm password</label>
                    <div class="pass-wrap">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password">
                    </div>
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="/platform/terms">Terms of Service</a> and <a href="/platform/privacy">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader hidden">
                        <svg class="spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
                    </span>
                </button>
            </form>

            <div class="divider">or</div>

            <div class="oauth-group">
                <a href="/platform/auth/discord" class="btn-oauth">
                    <svg viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.873-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128c.125-.094.252-.192.373-.292a.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.1.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>
                    Continue with Discord
                </a>
                <a href="/platform/auth/google" class="btn-oauth">
                    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.07 5.07 0 01-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A11 11 0 001 12c0 1.78.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Continue with Google
                </a>
                <a href="/platform/auth/apple" class="btn-oauth">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                    Continue with Apple
                </a>
            </div>

            <p class="terms-footer">
                You acknowledge that you read, and agree to our<br>
                <a href="/platform/terms">Terms of Service</a> and our <a href="/platform/privacy">Privacy Policy</a>.
            </p>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('signupForm');
        const alertEl = document.getElementById('alert');
        const btn = document.getElementById('submitBtn');
        const strengthFill = document.getElementById('strengthFill');
        const strengthLabel = document.getElementById('strengthLabel');

        function showAlert(msg, type = 'error') {
            const icon = type === 'error'
                ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
                : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
            alertEl.innerHTML = icon + ' ' + msg;
            alertEl.className = 'alert ' + type;
        }
        function hideAlert() { alertEl.className = 'alert'; }

        function setLoading(state) {
            btn.disabled = state;
            btn.querySelector('.btn-text').classList.toggle('hidden', state);
            btn.querySelector('.btn-loader').classList.toggle('hidden', !state);
        }

        // Password strength
        document.getElementById('password').addEventListener('input', (e) => {
            const pw = e.target.value;
            let score = 0;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
            if (/\d/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;

            const levels = [
                { w: '0%', c: 'transparent', t: '' },
                { w: '20%', c: '#ef4444', t: 'Very weak' },
                { w: '40%', c: '#f59e0b', t: 'Weak' },
                { w: '60%', c: '#f59e0b', t: 'Fair' },
                { w: '80%', c: '#22c55e', t: 'Strong' },
                { w: '100%', c: '#22c55e', t: 'Very strong' },
            ];
            const lvl = levels[Math.min(score, 5)];
            strengthFill.style.width = lvl.w;
            strengthFill.style.background = lvl.c;
            strengthLabel.textContent = lvl.t;
            strengthLabel.style.color = lvl.c;
        });

        // Password toggles
        document.querySelectorAll('.pass-toggle').forEach(t => {
            t.addEventListener('click', function() {
                const inp = this.parentElement.querySelector('input');
                inp.type = inp.type === 'password' ? 'text' : 'password';
                this.classList.toggle('active');
            });
        });

        const urlError = new URLSearchParams(window.location.search).get('error');
        if (urlError) showAlert(urlError);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsChecked = document.getElementById('terms').checked;

            if (!username || !email || !password || !confirmPassword) {
                showAlert('Please fill in all fields'); return;
            }
            if (password !== confirmPassword) {
                showAlert('Passwords do not match'); return;
            }
            if (password.length < 8) {
                showAlert('Password must be at least 8 characters'); return;
            }
            if (!termsChecked) {
                showAlert('Please agree to the Terms of Service'); return;
            }

            setLoading(true);
            hideAlert();

            try {
                const res = await fetch('/platform/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, confirmPassword }),
                    credentials: 'include'
                });
                const data = await res.json();
                if (data.success) {
                    showAlert('Account created! Redirecting...', 'success');
                    window.location.href = data.redirect || '/platform/auth/login';
                } else {
                    showAlert(data.error || 'Something went wrong');
                    setLoading(false);
                }
            } catch {
                showAlert('Connection error. Please try again.');
                setLoading(false);
            }
        });
    });
    </script>
</body>
</html>
